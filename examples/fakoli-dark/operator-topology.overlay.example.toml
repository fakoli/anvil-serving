# Illustrative overlay values for a private deployment.
# This file is deliberately partial: pass a private copy with
# --topology-overlay so records merge into operator-topology.toml by stable id.
# Keep credentials in environment variables; do not put tokens in an overlay.

command_host = "host:fakoli-mini"
command_runtime = "runtime:mini-native"

