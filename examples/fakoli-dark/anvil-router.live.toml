# =============================================================================
# CAPTURED LIVE DEPLOY CONFIG — fakoli-dark anvil-router (captured 2026-07-08)
# -----------------------------------------------------------------------------
# This is a normalized deploy recipe for the `anvil-router` container, captured
# from the `anvil-router-cfg` docker volume
# (`docker inspect anvil-router` → volume anvil-router-cfg:/etc/anvil:ro,
#  env ANVIL_CONFIG=/etc/anvil/config.toml).
#
# PROVENANCE / DRIFT NOTES (why this file exists):
#   * The running container reads its config from the `anvil-router-cfg` NAMED
#     VOLUME, NOT from this repo. Until now no repo file matched the deployed
#     config — this file closes that gap so the live config is reviewable and
#     version-controlled.
#   * `docker-compose.yml` mounts the external `anvil-router-cfg` volume at
#     `/etc/anvil:ro`. A fresh host must seed that volume with `config.toml`
#     before `compose up`; an empty volume has no config and will crash-loop.
#     Apply a measured `profile.json` only through the human-gated router
#     promotion path, not by editing this recipe.
#   * Networking: the tier `base_url`s reach the serves via `host.docker.internal`. The
#     deployed config's inline comment originally read "by compose service name"; it is
#     corrected to `host.docker.internal` here to match the actual URLs (a capture-fidelity
#     fix, not a behavior change).
#   * To update the live deploy FROM this file (once reconciled):
#       docker run --rm -v anvil-router-cfg:/cfg -v "$PWD:/src:ro" alpine \
#         cp /src/examples/fakoli-dark/anvil-router.live.toml /cfg/config.toml
#       docker restart anvil-router
# =============================================================================

# LIVE router config for the containerized deploy on fakoli-dark (ADR-0004).
# Based on configs/example-docker.toml, updated to the 2026-07-13 two-tier
# deployment: gemma4-e4b-it for fast local work (gpu-reservations:T006 swap; rollback tier
# model is qwen36-35b-a3b-nvfp4, see serves.toml `fast-qwen36-rollback`) and
# GPT-OSS Puzzle 88B for heavy local work. The Heavy checkpoint and the exact
# Anvil vLLM fork image are pinned in docker-compose.yml; Gemma 4 remains the
# immediate managed rollback.
# The router runs in a container on the `fakoli-dark_default` network and reaches the
# serves via `host.docker.internal` (see the tier `base_url`s below); only the router
# is published (authed via the token).
[server]
auth_env = "ANVIL_ROUTER_TOKEN"

[router]
mapping_version = "2026-07-18.gpt-oss-puzzle-88b-heavy"
# verify_local_min at its default (true): an empty local 200 becomes a 503 so the gateway
# fails over to native. (v0.7.0 note: tool-call-only replies — empty content + populated
# tool_calls — correctly PASS this gate; regression-pinned in #94. Tools now actually reach
# the local model since #96.)
verify_local_min = true
availability_probe_interval = 5
availability_probe_timeout = 1
# The deployed router image reads this path inside the anvil-router-cfg volume.
profile_path = "/etc/anvil/profile.json"

# gemma4-e4b-it's chat template honors chat_template_kwargs.enable_thinking (verified in the
# cached snapshot's chat_template.jinja), so the fast tier keeps thinking disabled like the
# previous qwen recipe did.
[[router.tiers]]
id            = "fast-local"
base_url      = "http://host.docker.internal:30003/v1"
model         = "gemma4-e4b-it"
# T011 rebalance (2026-07-13): the serve now runs the pre-quantized
# leon-se/gemma-4-E4B-it-FP8-Dynamic checkpoint inside a 14336 MiB reservation.
# Declaring the quantization keeps the serve fingerprint truthful; the profile
# fast-local rows are re-stamped to this identity in the same promotion.
quantization  = "fp8"
dialect       = "openai"
context_limit = 32768
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_FAST_LOCAL_KEY"
health_path   = "/health"
extra_body    = { chat_template_kwargs = { enable_thinking = false } }

[router.tiers.params]
generation_probe_max_tokens = 48
interaction_benchmark_max_tokens = 192
interaction_benchmark_stream_max_tokens = 128

[[router.tiers]]
id            = "heavy-local"
base_url      = "http://host.docker.internal:30002/v1"
model         = "gpt-oss-puzzle-88b"
dialect       = "openai"
context_limit = 131072
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_HEAVY_LOCAL_KEY"
health_path   = "/health"
model_identity = true
extra_body_defaults = { reasoning_effort = "high" }

[router.tiers.params]
generation_probe_max_tokens = 4352
interaction_benchmark_max_tokens = 4352
interaction_benchmark_stream_max_tokens = 4352
interaction_benchmark_max_tokens_by_intent = { planning = 4352 }
interaction_benchmark_stream_max_tokens_by_intent = { planning = 4352 }

# OCR tier (gpu-reservations:T011): PaddleOCR-VL-1.6 on the 5090 (serves.toml `ocr`,
# :30007), reached only through the "ocr" intent preset below. A document-parsing VLM,
# not a coding model: tool_support false keeps tool-carrying work off it, and the
# 16384-token window matches the serve's --max-model-len. Callers send the page as
# OpenAI image content plus the task prompt ("OCR:", "Table Recognition:", ...).
# CAPACITY NOTE: the serve is admission-gated by the dark-fast ledger and does not fit
# alongside the full T009 resident set (see serves.toml) — while it is down, the router's
# availability probe marks this tier unavailable and "ocr" requests exhaust cleanly (503).
[[router.tiers]]
id            = "ocr-local"
base_url      = "http://host.docker.internal:30007/v1"
model         = "paddleocr-vl-1.6"
dialect       = "openai"
context_limit = 16384
privacy       = "local"
tool_support  = false
auth_env      = "ANVIL_OCR_LOCAL_KEY"
health_path   = "/health"

# Vision tier (gpu-reservations:T013): Qwen3-VL-4B-Instruct on the 5090 (serves.toml
# `vision`, :30008), reached only through the "vision" intent preset below. A general
# image-understanding VLM (describe/ground a screenshot or photo) — distinct from
# ocr-local's verbatim document extraction. Not a coding model: tool_support false, and
# the 16384-token window matches the serve's --max-model-len. Callers send the image as
# OpenAI image content plus a prompt ("Describe this screenshot", ...).
# CAPACITY NOTE: the serve is an ADR-0017 `evictable` reservation and does not fit
# alongside the full dark-fast resident set (see serves.toml) — it runs opportunistically
# and yields to on-demand acquisitions via the T005 eviction flow. While it is down, the
# availability probe marks this tier unavailable and "vision" requests exhaust cleanly (503).
[[router.tiers]]
id            = "vision-local"
base_url      = "http://host.docker.internal:30008/v1"
model         = "qwen3-vl-4b-instruct"
dialect       = "openai"
context_limit = 16384
privacy       = "local"
tool_support  = false
auth_env      = "ANVIL_VISION_LOCAL_KEY"
health_path   = "/health"
# REQUIRED for the eviction lifecycle: after a T005 eviction the tier stays
# quiesced, and the guarded `router readmit` refuses with
# "identity_not_configured" unless it can verify the serve's exact model
# identity — without this flag an evicted vision tier can never re-enter
# rotation (verified live, 2026-07-13 T013).
model_identity = true

# Purpose-model serves (gpu-reservations:T009/T010, ADR-0017 §7): the always-on Qwen3
# embedding + reranker serves on the 5090 (serves.toml `embeddings`/`reranker`), routed BY
# MODEL NAME on POST /v1/embeddings and POST /v1/rerank under the same router token. An
# unknown model name is a clean 404 — never a fallthrough to chat routing. Reached over
# host.docker.internal like the chat tiers; no auth (loopback-published pooling serves).
[[router.purpose_models]]
id       = "embeddings-local"
kind     = "embedding"
model    = "qwen3-embedding-0.6b"
base_url = "http://host.docker.internal:30005/v1"

[[router.purpose_models]]
id       = "reranker-local"
kind     = "rerank"
model    = "qwen3-reranker-0.6b"
base_url = "http://host.docker.internal:30006/v1"

# heavy-first where quality matters; chat-fast pins to the fast tier first.
# ocr/vision route ONLY to their VLM tiers — the text tiers cannot read image
# content, so there is no meaningful fallback: exhaustion (503) is the correct
# failure mode.
[router.presets]
chat         = ["heavy-local", "fast-local"]
chat-fast    = ["fast-local", "heavy-local"]
quick-edit   = ["heavy-local", "fast-local"]
review       = ["heavy-local"]
planning     = ["heavy-local"]
long-context = ["heavy-local"]
ocr          = ["ocr-local"]
vision       = ["vision-local"]
