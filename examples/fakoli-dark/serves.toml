# Declarative serves manifest for the fakoli-dark topology.
#
# `anvil-serving serves {status|up|down}` reads this. It is the single source of
# truth for "which model containers exist, on which ports" — the gap that made
# stopping/starting the serves a manual `docker` chore.
#
# These two serves back the router tiers in configs/example.toml
# (heavy-local -> :30000, fast-local -> :30001). `{dir}` resolves to this file's
# directory.
#
# BOTH serves are now Docker-Compose-defined (docker-compose.yml holds a service per
# tier) — see docs/adr/0002-serves-are-compose-defined.md. Each `up` targets its own
# compose service by name, so `serves up heavy` and `serves up fast` stay independent.
# `docker compose up -d` is drift-safe: it natively recreates a service whose config has
# changed, fixing the old bug where a stopped `docker run` container kept serving a stale
# model. The old serve-fast-gptoss-vllm.sh is superseded (kept only as reference).

[[serve]]
name = "heavy"                 # heavy coder tier (qwen35-awq on the 96 GB card)
container = "sglang"
port = 30000
model = "qwen35-awq-local"     # served-model-name (used by `anvil-serving eval`)
health = "/health"
up = "docker compose -f {dir}/docker-compose.yml up -d sglang"

[[serve]]
name = "fast"                  # fast tier (gpt-oss-20b on the RTX 5090)
container = "vllm-gptoss"
port = 30001
model = "gpt-oss-20b"          # served-model-name (used by `anvil-serving eval`)
health = "/health"
up = "docker compose -f {dir}/docker-compose.yml up -d fast"
