# Declarative serves manifest for the fakoli-dark (flexibility-mode) topology.
#
# `anvil-serving serves {status|up|down}` reads this — the single source of truth for
# "which model containers exist, on which ports". Manage the serves ONLY through
# `anvil-serving serves` (which delegates to docker-compose.yml), never raw `docker`.
#
# 2026-07-08 reconcile: heavy = gpt-oss-120b @high (promoted heavy tier, :30002, PRO 6000);
# fast = Qwen3.6-35B-A3B-NVFP4 (:30003, RTX 5090). These back the router tiers in the live
# config (heavy-local -> :30002, fast-local -> :30003). `{dir}` resolves to this file's dir.
#
# BOTH serves are Docker-Compose-defined (docker-compose.yml holds a service per tier) — see
# docs/adr/0002-serves-are-compose-defined.md. Each `up` targets its own compose service by
# name, so `serves up heavy` and `serves up fast` stay independent. `docker compose up -d` is
# drift-safe (natively recreates a service whose config changed). Use `serves up --recreate
# <name>` to force a fresh container.

[[serve]]
name = "heavy"                 # heavy planning tier — gpt-oss-120b @ reasoning_effort=high
container = "vllm-gptoss120"
port = 30002
model = "gpt-oss-120b"         # served-model-name (used by `anvil-serving eval`)
engine = "vllm"
health = "/health"
up = "docker compose -f {dir}/docker-compose.yml up -d heavy"

[[serve]]
name = "fast"                  # fast tier — Qwen3.6-35B-A3B-NVFP4 on the RTX 5090
container = "vllm-qwen36"
port = 30003
model = "qwen36-35b-a3b-nvfp4" # served-model-name (used by `anvil-serving eval`)
engine = "vllm"
health = "/health"
up = "docker compose -f {dir}/docker-compose.yml up -d fast"

# Voice latency A/B candidates. These are opt-in experiment serves, not production tiers:
# they use separate ports, `restart: "no"` compose services, and do not replace `fast`.
#
# Start/stop through the managed surface:
#   anvil-serving serves --manifest examples/fakoli-dark/serves.toml up voice-qwen3-32b
#   anvil-serving serves --manifest examples/fakoli-dark/serves.toml down voice-qwen3-32b
#
# The experiment compose defaults to loopback-only publishes. For cross-host Mini validation,
# set VOICE_CANDIDATE_PUBLISH to this host's tailnet/private address before `serves up`.

[[serve]]
name = "voice-qwen3-32b"
container = "vllm-voice-qwen3-32b"
port = 39000
model = "qwen3-32b-nvfp4"
engine = "vllm"
health = "/health"
up = "docker compose -f {dir}/docker-compose.experiment.yml up -d voice-qwen3-32b"

[[serve]]
name = "voice-gemma4-12b"
container = "vllm-voice-gemma4-12b"
port = 39001
model = "gemma4-12b-it"
engine = "vllm"
health = "/health"
up = "docker compose -f {dir}/docker-compose.experiment.yml up -d voice-gemma4-12b"

[[serve]]
name = "voice-gemma4-e4b"
container = "vllm-voice-gemma4-e4b"
port = 39002
model = "gemma4-e4b-it"
engine = "vllm"
health = "/health"
