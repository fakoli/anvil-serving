  # Evaluation serves only (never production). 5090-track candidates (:39020-21)
  # coexist with the live heavy tier; PRO-6000-track candidates (:39022-24) share
  # the card with GPT-OSS heavy — bring `heavy` DOWN first. All are managed via
  # `anvil-serving serves up/down <name>` and publish loopback-only.
  # NGC vllm images int-parse CUDA_VISIBLE_DEVICES (see heavy-qwen35-122b note),
  # so these pin by PCI_BUS_ID index: GPU0 = RTX 5090, GPU1 = RTX PRO 6000.
  cand-nemotron3-nano-30b:
    image: ${BAKEOFF_NGC_VLLM_IMAGE:-nvcr.io/nvidia/vllm:26.04-py3}
    container_name: vllm-cand-nemotron3-nano-30b
    restart: "no"
    ipc: host
    shm_size: "8gb"
    ports:
      - "127.0.0.1:39020:39020"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
      # Official reasoning parser from the model card (nano_v3): without it,
      # think-text leaks into content and tool-call extraction misfires.
      - "./nano_v3_reasoning_parser.py:/opt/nano_v3_reasoning_parser.py:ro"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: "0"
