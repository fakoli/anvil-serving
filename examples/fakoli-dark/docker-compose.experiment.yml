# Parametrized vLLM experiment harness — stand up ANY model for a one-off trial without
# hand-building a `docker run` line (which mangles /model paths under MSYS, drops quoting, and
# drifts). One service, driven entirely by env vars, with the hard-won sm_120/WSL2 defaults baked
# in. This is the "add a model to the Blackwell lab notebook" path; the permanent tiers live in
# docker-compose.yml. See docs/adr/0002-serves-are-compose-defined.md.
#
# Usage — MODEL, GPU_UUID, SERVED_NAME, PORT, and EXTRA_ARGS can be overridden:
#
#   MODEL=RedHatAI/Qwen3-32B-NVFP4 \
#   GPU_UUID=GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1 \
#   PORT=30002 SERVED_NAME=qwen3-32b-nvfp4 \
#     docker compose -f examples/fakoli-dark/docker-compose.experiment.yml up -d
#
#   # extra vLLM flags (e.g. Qwen reasoning/tool parsers) ride in EXTRA_ARGS:
#   EXTRA_ARGS="--reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder --trust-remote-code" \
#     MODEL=... GPU_UUID=... docker compose -f examples/fakoli-dark/docker-compose.experiment.yml up -d
#
#   docker compose -f examples/fakoli-dark/docker-compose.experiment.yml logs -f experiment
#   PORT=30002 docker compose -f examples/fakoli-dark/docker-compose.experiment.yml down
#
# Hard-won defaults baked in (docs/findings/blackwell-sm120-lab-notebook.md + CLAUDE.md gotchas):
#   - image vLLM 0.25.1 by digest         stable; the lab's known-good engine (:nightly only when a
#                                         needed fix hasn't reached stable).
#   - VLLM_WSL2_ENABLE_PIN_MEMORY=1       vLLM 0.25.1+ opt-in: restore pinned host memory on WSL2.
#   - VLLM_USE_V2_MODEL_RUNNER=0          conservative default for hybrid models; Gemma 4 V1/V2
#                                         experiments override this per lane after a live startup gate.
#   - vllm-hfcache docker volume          D:-backed ext4 -> ~15s native reloads vs 20-90min over a
#                                         C:/ 9P bind-mount; pass the HF repo-id as MODEL and vLLM
#                                         resolves it from (or downloads it once into) the cache (#15).
#   - GPU pinned by UUID + PCI_BUS_ID     the right card, every time (gotcha #13).
#
# A DISTINCT Compose project name (`fakoli-experiment`) keeps experiment `up`/`down` from
# touching the production `fakoli-dark` serves: without it both files default their project
# name to the directory (`fakoli-dark`), so an experiment `down` reports the live tiers as
# orphans and churns the shared network.
name: fakoli-experiment

x-voice-candidate-env: &voice-candidate-env
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  VLLM_WSL2_ENABLE_PIN_MEMORY: "1"
  VLLM_USE_V2_MODEL_RUNNER: "0"
  FLASHINFER_CUDA_ARCH_LIST: "12.0f"
  HF_TOKEN: ${HF_TOKEN:-}

x-voice-candidate-common: &voice-candidate-common
  restart: "no"
  ipc: host
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"
  entrypoint: ["vllm"]

x-fast-candidate-env: &fast-candidate-env
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  VLLM_WSL2_ENABLE_PIN_MEMORY: "1"
  VLLM_USE_V2_MODEL_RUNNER: "0"
  FLASHINFER_CUDA_ARCH_LIST: "12.0f"
  HF_TOKEN: ${HF_TOKEN:-}

x-fast-vllm-common: &fast-vllm-common
  restart: "no"
  ipc: host
  image: ${FAST_VLLM_IMAGE:-vllm/vllm-openai:nightly}
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"
  entrypoint: ["vllm"]

x-fast-sglang-common: &fast-sglang-common
  restart: "no"
  ipc: host
  image: ${FAST_SGLANG_IMAGE:-lmsysorg/sglang:latest}
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"

x-fast-llamacpp-common: &fast-llamacpp-common
  restart: "no"
  ipc: host
  image: ${FAST_LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
  volumes:
    - "llamacpp-cache:/root/.cache/llama.cpp"
    # Current llama.cpp builds resolve -hf downloads into the HF hub cache
    # layout, NOT ~/.cache/llama.cpp — mount the volume there too, or 20 GB
    # GGUFs silently land in the container writable layer and die with it
    # (found the hard way, 2026-07-11).
    - "llamacpp-cache:/root/.cache/huggingface"

services:
  # Heavy-tier CANDIDATE (evaluation, NOT production): Qwen3.5-122B-A10B-NVFP4 on the RTX PRO 6000
  # (:39017, loopback-only). Managed via `anvil-serving serves up/down heavy-qwen35-122b`. It does
  # NOT replace the GPT-OSS heavy tier and shares the same PRO 6000 card, so bring GPT-OSS heavy
  # DOWN before starting this candidate (see serves.toml + the bake-off runbook).
  heavy-qwen35-122b:
    image: nvcr.io/nvidia/vllm:26.04-py3
    container_name: vllm-heavy-qwen35-122b
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "127.0.0.1:39017:39017"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # WSL2 ignores compose device_ids isolation (gotcha #13) -> container sees BOTH GPUs, so we
      # still pin the PRO 6000 via CUDA_VISIBLE_DEVICES. FALLBACK vs the UUID convention: the NGC
      # vllm:26.04 image's device_id_to_physical_device_id does int(<visible>), which ValueErrors on
      # a UUID string. Pin by PCI_BUS_ID index instead — verified GPU0=RTX 5090, GPU1=PRO 6000.
      CUDA_VISIBLE_DEVICES: "1"
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "${HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}"
              capabilities: [gpu]
    entrypoint: ["vllm"]
    command: >
      serve nvidia/Qwen3.5-122B-A10B-NVFP4
      --served-model-name qwen35-122b-a10b-nvfp4
      --trust-remote-code
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --tensor-parallel-size 1
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --max-model-len 131072
      --max-num-seqs 1
      --gpu-memory-utilization 0.95
      --language-model-only
      --enable-prefix-caching
      --host 0.0.0.0
      --port 39017

  experiment:
    image: vllm/vllm-openai@sha256:e4f88a835143cd22aee2397a26ec6bb80b3a4a6fe0c882bcbc63822904766089
    container_name: vllm-experiment-${PORT:-39099}
    restart: "no"
    ipc: host
    ports:
      # Loopback-only publish: the experiment vLLM endpoint is unauthenticated and must not
      # be LAN-exposed (127.0.0.1-only repo, CLAUDE.md gotcha #1 / SECURITY.md).
      - "127.0.0.1:${PORT:-39099}:${PORT:-39099}"
    volumes:
      # Native-speed weights cache (backed by D: ext4). vLLM downloads a new MODEL here once,
      # then reloads it in ~15s. Deliberately NOT a C:/ bind-mount (9P ~15 MB/s cold-load tax).
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # Docker-Desktop/WSL2 does NOT honor Compose `device_ids` GPU isolation (gotcha #13),
      # so also select the target card via CUDA_VISIBLE_DEVICES=<UUID>. Belt-and-suspenders
      # with the device_ids reservation below.
      CUDA_VISIBLE_DEVICES: ${GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
      VLLM_WSL2_ENABLE_PIN_MEMORY: "1"
      VLLM_USE_V2_MODEL_RUNNER: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    # Pin the entrypoint: upstream flipped the image default from `vllm` to `vllm serve`,
    # which made the leading `serve` below double up and break arg parsing (hit live
    # 2026-07-02: "vllm: error: unrecognized arguments: <model>"). Explicit entrypoint
    # is stable against either image vintage.
    entrypoint: ["vllm"]
    command: >
      serve ${MODEL:-nvidia/Qwen3.6-27B-NVFP4}
      --served-model-name ${SERVED_NAME:-experiment}
      --gpu-memory-utilization 0.90
      --host 0.0.0.0 --port ${PORT:-39099}
      ${EXTRA_ARGS:-}

  # Read-only CUDA capability probe for the Docker Desktop/WSL GPU path.
  # This intentionally compiles and runs only driver/runtime inventory calls:
  # it does NOT create a Green Context, CUDA stream, MPS daemon/partition, or workload.
  # Keep it behind an explicit profile. Normal operator use goes through the
  # confirmation-gated `anvil-serving host gpu-sharing probe` wrapper.
  gpu-sharing-inspect:
    profiles: ["gpu-sharing-probe"]
    # Official NVIDIA CUDA 13.1.1 multi-platform index, with linux/amd64 selected
    # explicitly below. The product wrapper refuses overrides; direct diagnostic
    # Compose use must review any replacement CUDA 13.1+ devel image separately.
    image: ${GPU_SHARING_PROBE_IMAGE:-nvidia/cuda@sha256:9cf8694a27722418a1f175d90f85d5afb5a728fd4a9907d7f0565efecfa14d32}
    platform: linux/amd64
    container_name: cuda-green-context-inspect
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /run/anvil:size=128m,mode=0755,exec
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    volumes:
      - "./gpu-sharing:/opt/anvil-gpu-sharing:ro"
    working_dir: /opt/anvil-gpu-sharing
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >-
        nvcc -std=c++17 -O2
        /opt/anvil-gpu-sharing/inspect.cu
        -lcuda -ldl -o /run/anvil/gpu-sharing-inspect
        && /run/anvil/gpu-sharing-inspect

  # Managed voice-latency candidates. These are opt-in A/B serves, not production tiers.
  # They use distinct container names and ports so `anvil-serving serves up/down <name>`
  # can manage them without touching the live heavy/fast/router compose services.
  #
  # Default publish is loopback-only. For OpenClaw-on-Mini cross-host validation, set
  # VOICE_CANDIDATE_PUBLISH to fakoli-dark's tailnet/private address before `serves up`.
  voice-qwen3-32b:
    <<: *voice-candidate-common
    image: vllm/vllm-openai:nightly
    container_name: vllm-voice-qwen3-32b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39000:39000"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_QWEN3_32B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_QWEN3_32B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve nvidia/Qwen3-32B-NVFP4
      --served-model-name qwen3-32b-nvfp4
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --max-model-len 32768
      --max-num-seqs 4
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39000

  # gemma4-unified image: pin by PCI-ordered INDEX, not UUID — the image int()-parses
  # CUDA_VISIBLE_DEVICES at import (vllm/kernels/oink_ops.py) and crashes on a UUID value
  # (CLAUDE.md gotcha #21; this is why the 2026-07-08 voice A/B gemma4 candidates
  # "failed before STT"). CUDA_DEVICE_ORDER=PCI_BUS_ID (from the env anchor) makes
  # index 0 deterministically the RTX 5090 (bus 01:00.0 < 03:00.0).
  voice-gemma4-12b:
    <<: *voice-candidate-common
    image: ${VOICE_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-voice-gemma4-12b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39001:39001"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_GEMMA4_12B_CUDA_DEVICE:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_GEMMA4_12B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve google/gemma-4-12B-it
      --served-model-name gemma4-12b-it
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template examples/tool_chat_template_gemma4.jinja
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39001

  # Index pin, not UUID — same gemma4-unified image constraint as voice-gemma4-12b above.
  voice-gemma4-e4b:
    <<: *voice-candidate-common
    image: ${VOICE_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-voice-gemma4-e4b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39002:39002"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_GEMMA4_E4B_CUDA_DEVICE:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_GEMMA4_E4B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve google/gemma-4-E4B-it
      --served-model-name gemma4-e4b-it
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39002

  # Gemma 4 chat-template bakeoff lanes (2026-07-16). These services pin the
  # model and tokenizer revisions independently so the July 15 canonical
  # template can be tested with unchanged weights as well as the new official
  # checkpoints. Deliberately DO NOT add --chat-template here: vLLM's bundled
  # examples/tool_chat_template_gemma4.jinja predates the canonical repair and
  # would bypass the template under test. Both endpoints remain loopback-only,
  # evaluation-only, and outside router policy.
  gemma4-fast-lab:
    image: ${GEMMA4_VLLM_IMAGE:-vllm/vllm-openai@sha256:e4f88a835143cd22aee2397a26ec6bb80b3a4a6fe0c882bcbc63822904766089}
    container_name: vllm-gemma4-fast-lab
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "127.0.0.1:39037:39037"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${GEMMA4_FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
      # vLLM 0.25.1's WSL2 pinned-memory path is opt-in. V2 remains an explicit
      # experiment for Gemma 4 because hybrid attention is excluded from the
      # engine's automatic V2 default.
      VLLM_WSL2_ENABLE_PIN_MEMORY: ${GEMMA4_WSL2_ENABLE_PIN_MEMORY:-1}
      VLLM_USE_V2_MODEL_RUNNER: ${GEMMA4_FAST_USE_V2_MODEL_RUNNER:-0}
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GEMMA4_FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    entrypoint: ["vllm"]
    command: >
      serve ${GEMMA4_FAST_MODEL:-google/gemma-4-E4B-it-qat-w4a16-ct}
      --revision ${GEMMA4_FAST_REVISION:-29eacc1fb21041c5168e898028cf1653d5c10dfe}
      --tokenizer ${GEMMA4_FAST_TOKENIZER:-google/gemma-4-E4B-it}
      --tokenizer-revision ${GEMMA4_FAST_TOKENIZER_REVISION:-fa62d88df2e6df5efa9d26ad6b3beaea2765f0cd}
      --served-model-name gemma4-fast-lab
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --limit-mm-per-prompt '{"image":0,"audio":0}'
      --max-model-len ${GEMMA4_FAST_MAX_MODEL_LEN:-32768}
      --max-num-seqs ${GEMMA4_FAST_MAX_NUM_SEQS:-2}
      --gpu-memory-utilization ${GEMMA4_FAST_GPU_MEMORY_UTILIZATION:-0.78}
      --host 0.0.0.0 --port 39037
      ${GEMMA4_FAST_EXTRA_ARGS:-}

  gemma4-heavy-lab:
    image: ${GEMMA4_VLLM_IMAGE:-vllm/vllm-openai@sha256:e4f88a835143cd22aee2397a26ec6bb80b3a4a6fe0c882bcbc63822904766089}
    container_name: vllm-gemma4-heavy-lab
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "127.0.0.1:39038:39038"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${GEMMA4_HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}
      VLLM_WSL2_ENABLE_PIN_MEMORY: ${GEMMA4_WSL2_ENABLE_PIN_MEMORY:-1}
      VLLM_USE_V2_MODEL_RUNNER: ${GEMMA4_HEAVY_USE_V2_MODEL_RUNNER:-0}
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GEMMA4_HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}"]
              capabilities: [gpu]
    entrypoint: ["vllm"]
    command: >
      serve ${GEMMA4_HEAVY_MODEL:-google/gemma-4-26B-A4B-it}
      --revision ${GEMMA4_HEAVY_REVISION:-01e5b3ee840d3a9e0b0b493c593e85398a30ef75}
      --tokenizer ${GEMMA4_HEAVY_TOKENIZER:-google/gemma-4-26B-A4B-it}
      --tokenizer-revision ${GEMMA4_HEAVY_TOKENIZER_REVISION:-01e5b3ee840d3a9e0b0b493c593e85398a30ef75}
      --served-model-name gemma4-heavy-lab
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --limit-mm-per-prompt '{"image":0,"audio":0}'
      --max-model-len ${GEMMA4_HEAVY_MAX_MODEL_LEN:-32768}
      --max-num-seqs ${GEMMA4_HEAVY_MAX_NUM_SEQS:-2}
      --gpu-memory-utilization ${GEMMA4_HEAVY_GPU_MEMORY_UTILIZATION:-0.95}
      --host 0.0.0.0 --port 39038
      ${GEMMA4_HEAVY_EXTRA_ARGS:-}

  # Experimental Fast voice TTS candidate. Gepard exposes Cartesia-compatible
  # `/tts/websocket` streaming TTS on container port 8000. It needs HF_TOKEN
  # for first-run model access and Postgres for cloned voice prefixes. The
  # database below stays internal to this Compose project; override
  # GEPARD_DATABASE_URL only when using an external Postgres.
  gepard-postgres:
    image: ${GEPARD_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: gepard-fast-tts-postgres
    restart: "no"
    environment:
      POSTGRES_DB: gepard
      POSTGRES_USER: gepard
      # Internal experiment-only store; no host port is published. For a
      # passworded/external DB, set GEPARD_DATABASE_URL for tts-gepard-fast.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - "gepard-postgres-data:/var/lib/postgresql/data"
      - "./gepard-postgres-init.sql:/docker-entrypoint-initdb.d/001-gepard-voices.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gepard -d gepard"]
      interval: 5s
      timeout: 3s
      retries: 12

  tts-gepard-fast:
    image: ${GEPARD_TTS_IMAGE:-ylankgz/gepard-vllm:latest}
    container_name: gepard-fast-tts
    restart: "no"
    ipc: host
    depends_on:
      gepard-postgres:
        condition: service_healthy
    ports:
      - "${VOICE_TTS_CANDIDATE_PUBLISH:-127.0.0.1}:39111:8000"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # Docker pins the host GPU by UUID below. Inside this Gepard/vLLM image,
      # expose the selected device as integer 0 because its vLLM build attempts
      # to parse CUDA_VISIBLE_DEVICES as an int during architecture inspection.
      CUDA_VISIBLE_DEVICES: ${GEPARD_TTS_CUDA_VISIBLE_DEVICES:-0}
      HF_TOKEN: ${HF_TOKEN:-}
      DATABASE_URL: ${GEPARD_DATABASE_URL:-postgresql://gepard@gepard-postgres:5432/gepard}
      TTS_MODEL_PATH: ${GEPARD_TTS_MODEL_PATH:-nineninesix/gepard-1.0}
      TTS_GPU_MEMORY_UTILIZATION: ${GEPARD_TTS_GPU_MEMORY_UTILIZATION:-0.12}
      TTS_MAX_NUM_SEQS: ${GEPARD_TTS_MAX_NUM_SEQS:-4}
      TTS_CODEC_MAX_DECODE_BATCH: ${GEPARD_TTS_CODEC_MAX_DECODE_BATCH:-4}
      TTS_FIRST_CHUNK_FRAMES: ${GEPARD_TTS_FIRST_CHUNK_FRAMES:-10}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GEPARD_TTS_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]

  # Fast-tier LLM bakeoff candidates. These are source-backed experiment
  # services only: no restart policy, no production tier replacement, and no
  # Heavy-card default. `FAST_CANDIDATE_GPU_UUID` defaults to the RTX 5090.
  fast-qwen36-35b-a3b:
    <<: *fast-vllm-common
