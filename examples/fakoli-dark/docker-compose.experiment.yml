# Parametrized vLLM experiment harness — stand up ANY model for a one-off trial without
# hand-building a `docker run` line (which mangles /model paths under MSYS, drops quoting, and
# drifts). One service, driven entirely by env vars, with the hard-won sm_120/WSL2 defaults baked
# in. This is the "add a model to the Blackwell lab notebook" path; the permanent tiers live in
# docker-compose.yml. See docs/adr/0002-serves-are-compose-defined.md.
#
# Usage — MODEL, GPU_UUID, SERVED_NAME, PORT, and EXTRA_ARGS can be overridden:
#
#   MODEL=RedHatAI/Qwen3-32B-NVFP4 \
#   GPU_UUID=GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1 \
#   PORT=30002 SERVED_NAME=qwen3-32b-nvfp4 \
#     docker compose -f examples/fakoli-dark/docker-compose.experiment.yml up -d
#
#   # extra vLLM flags (e.g. Qwen reasoning/tool parsers) ride in EXTRA_ARGS:
#   EXTRA_ARGS="--reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder --trust-remote-code" \
#     MODEL=... GPU_UUID=... docker compose -f examples/fakoli-dark/docker-compose.experiment.yml up -d
#
#   docker compose -f examples/fakoli-dark/docker-compose.experiment.yml logs -f experiment
#   PORT=30002 docker compose -f examples/fakoli-dark/docker-compose.experiment.yml down
#
# Hard-won defaults baked in (docs/findings/blackwell-sm120-lab-notebook.md + CLAUDE.md gotchas):
#   - image vllm/vllm-openai:latest       stable; the lab's known-good engine (:nightly only when a
#                                         needed fix hasn't reached stable).
#   - VLLM_USE_V2_MODEL_RUNNER=0          mandatory: WSL2 exposes no UVA -> the v2 runner's UvaBuffer
#                                         dies with "RuntimeError: UVA is not available" (gotcha #14).
#   - vllm-hfcache docker volume          D:-backed ext4 -> ~15s native reloads vs 20-90min over a
#                                         C:/ 9P bind-mount; pass the HF repo-id as MODEL and vLLM
#                                         resolves it from (or downloads it once into) the cache (#15).
#   - GPU pinned by UUID + PCI_BUS_ID     the right card, every time (gotcha #13).
#
# A DISTINCT Compose project name (`fakoli-experiment`) keeps experiment `up`/`down` from
# touching the production `fakoli-dark` serves: without it both files default their project
# name to the directory (`fakoli-dark`), so an experiment `down` reports the live tiers as
# orphans and churns the shared network.
name: fakoli-experiment

x-voice-candidate-env: &voice-candidate-env
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  VLLM_USE_V2_MODEL_RUNNER: "0"
  FLASHINFER_CUDA_ARCH_LIST: "12.0f"
  HF_TOKEN: ${HF_TOKEN:-}

x-voice-candidate-common: &voice-candidate-common
  restart: "no"
  ipc: host
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"
  entrypoint: ["vllm"]

x-fast-candidate-env: &fast-candidate-env
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  VLLM_USE_V2_MODEL_RUNNER: "0"
  FLASHINFER_CUDA_ARCH_LIST: "12.0f"
  HF_TOKEN: ${HF_TOKEN:-}

x-fast-vllm-common: &fast-vllm-common
  restart: "no"
  ipc: host
  image: ${FAST_VLLM_IMAGE:-vllm/vllm-openai:nightly}
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"
  entrypoint: ["vllm"]

x-fast-sglang-common: &fast-sglang-common
  restart: "no"
  ipc: host
  image: ${FAST_SGLANG_IMAGE:-lmsysorg/sglang:latest}
  volumes:
    - "vllm-hfcache:/root/.cache/huggingface"

x-fast-llamacpp-common: &fast-llamacpp-common
  restart: "no"
  ipc: host
  image: ${FAST_LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
  volumes:
    - "llamacpp-cache:/root/.cache/llama.cpp"

services:
  experiment:
    image: vllm/vllm-openai:latest
    container_name: vllm-experiment-${PORT:-39099}
    restart: "no"
    ipc: host
    ports:
      # Loopback-only publish: the experiment vLLM endpoint is unauthenticated and must not
      # be LAN-exposed (127.0.0.1-only repo, CLAUDE.md gotcha #1 / SECURITY.md).
      - "127.0.0.1:${PORT:-39099}:${PORT:-39099}"
    volumes:
      # Native-speed weights cache (backed by D: ext4). vLLM downloads a new MODEL here once,
      # then reloads it in ~15s. Deliberately NOT a C:/ bind-mount (9P ~15 MB/s cold-load tax).
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # Docker-Desktop/WSL2 does NOT honor Compose `device_ids` GPU isolation (gotcha #13),
      # so also select the target card via CUDA_VISIBLE_DEVICES=<UUID>. Belt-and-suspenders
      # with the device_ids reservation below.
      CUDA_VISIBLE_DEVICES: ${GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
      VLLM_USE_V2_MODEL_RUNNER: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    # Pin the entrypoint: upstream flipped the image default from `vllm` to `vllm serve`,
    # which made the leading `serve` below double up and break arg parsing (hit live
    # 2026-07-02: "vllm: error: unrecognized arguments: <model>"). Explicit entrypoint
    # is stable against either image vintage.
    entrypoint: ["vllm"]
    command: >
      serve ${MODEL:-nvidia/Qwen3.6-27B-NVFP4}
      --served-model-name ${SERVED_NAME:-experiment}
      --gpu-memory-utilization 0.90
      --host 0.0.0.0 --port ${PORT:-39099}
      ${EXTRA_ARGS:-}

  # Managed voice-latency candidates. These are opt-in A/B serves, not production tiers.
  # They use distinct container names and ports so `anvil-serving serves up/down <name>`
  # can manage them without touching the live heavy/fast/router compose services.
  #
  # Default publish is loopback-only. For OpenClaw-on-Mini cross-host validation, set
  # VOICE_CANDIDATE_PUBLISH to fakoli-dark's tailnet/private address before `serves up`.
  voice-qwen3-32b:
    <<: *voice-candidate-common
    image: vllm/vllm-openai:nightly
    container_name: vllm-voice-qwen3-32b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39000:39000"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_QWEN3_32B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_QWEN3_32B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve nvidia/Qwen3-32B-NVFP4
      --served-model-name qwen3-32b-nvfp4
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --max-model-len 32768
      --max-num-seqs 4
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39000

  voice-gemma4-12b:
    <<: *voice-candidate-common
    image: ${VOICE_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-voice-gemma4-12b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39001:39001"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_GEMMA4_12B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_GEMMA4_12B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve google/gemma-4-12B-it
      --served-model-name gemma4-12b-it
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template examples/tool_chat_template_gemma4.jinja
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39001

  voice-gemma4-e4b:
    <<: *voice-candidate-common
    image: ${VOICE_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-voice-gemma4-e4b
    ports:
      - "${VOICE_CANDIDATE_PUBLISH:-127.0.0.1}:39002:39002"
    environment:
      <<: *voice-candidate-env
      CUDA_VISIBLE_DEVICES: ${VOICE_GEMMA4_E4B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOICE_GEMMA4_E4B_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve google/gemma-4-E4B-it
      --served-model-name gemma4-e4b-it
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39002

  # Experimental Fast voice TTS candidate. Gepard exposes Cartesia-compatible
  # `/tts/websocket` streaming TTS on container port 8000. It needs HF_TOKEN
  # for first-run model access and Postgres for cloned voice prefixes. The
  # database below stays internal to this Compose project; override
  # GEPARD_DATABASE_URL only when using an external Postgres.
  gepard-postgres:
    image: ${GEPARD_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: gepard-fast-tts-postgres
    restart: "no"
    environment:
      POSTGRES_DB: gepard
      POSTGRES_USER: gepard
      # Internal experiment-only store; no host port is published. For a
      # passworded/external DB, set GEPARD_DATABASE_URL for tts-gepard-fast.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - "gepard-postgres-data:/var/lib/postgresql/data"
      - "./gepard-postgres-init.sql:/docker-entrypoint-initdb.d/001-gepard-voices.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gepard -d gepard"]
      interval: 5s
      timeout: 3s
      retries: 12

  tts-gepard-fast:
    image: ${GEPARD_TTS_IMAGE:-ylankgz/gepard-vllm:latest}
    container_name: gepard-fast-tts
    restart: "no"
    ipc: host
    depends_on:
      gepard-postgres:
        condition: service_healthy
    ports:
      - "${VOICE_TTS_CANDIDATE_PUBLISH:-127.0.0.1}:39111:8000"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # Docker pins the host GPU by UUID below. Inside this Gepard/vLLM image,
      # expose the selected device as integer 0 because its vLLM build attempts
      # to parse CUDA_VISIBLE_DEVICES as an int during architecture inspection.
      CUDA_VISIBLE_DEVICES: ${GEPARD_TTS_CUDA_VISIBLE_DEVICES:-0}
      HF_TOKEN: ${HF_TOKEN:-}
      DATABASE_URL: ${GEPARD_DATABASE_URL:-postgresql://gepard@gepard-postgres:5432/gepard}
      TTS_MODEL_PATH: ${GEPARD_TTS_MODEL_PATH:-nineninesix/gepard-1.0}
      TTS_GPU_MEMORY_UTILIZATION: ${GEPARD_TTS_GPU_MEMORY_UTILIZATION:-0.12}
      TTS_MAX_NUM_SEQS: ${GEPARD_TTS_MAX_NUM_SEQS:-4}
      TTS_CODEC_MAX_DECODE_BATCH: ${GEPARD_TTS_CODEC_MAX_DECODE_BATCH:-4}
      TTS_FIRST_CHUNK_FRAMES: ${GEPARD_TTS_FIRST_CHUNK_FRAMES:-10}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GEPARD_TTS_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]

  # Fast-tier LLM bakeoff candidates. These are source-backed experiment
  # services only: no restart policy, no production tier replacement, and no
  # Heavy-card default. `FAST_CANDIDATE_GPU_UUID` defaults to the RTX 5090.
  fast-qwen36-35b-a3b:
    <<: *fast-vllm-common
    container_name: vllm-fast-qwen36-35b-a3b
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39010:39010"
    environment:
      <<: *fast-candidate-env
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve nvidia/Qwen3.6-35B-A3B-NVFP4
      --served-model-name qwen36-35b-a3b-nvfp4
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --max-model-len 32768
      --max-num-seqs 2
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39010

  fast-gemma4-31b:
    <<: *fast-vllm-common
    image: ${FAST_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-fast-gemma4-31b
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39011:39011"
    environment:
      <<: *fast-candidate-env
      # The Gemma 4 support image's model-inspection subprocess currently
      # parses NVIDIA/CUDA-visible device ids as integers, so this one service
      # uses device 0. On fakoli-dark, status evidence shows GPU 0 is the RTX
      # 5090; other candidates keep UUID pinning.
      CUDA_VISIBLE_DEVICES: ${FAST_GEMMA4_CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GEMMA4_DEVICE_ID:-0}"]
              capabilities: [gpu]
    command: >
      serve nvidia/Gemma-4-31B-IT-NVFP4
      --served-model-name gemma4-31b-it-nvfp4
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template examples/tool_chat_template_gemma4.jinja
      --trust-remote-code
      --max-model-len ${FAST_GEMMA4_MAX_MODEL_LEN:-32768}
      --max-num-seqs ${FAST_GEMMA4_MAX_NUM_SEQS:-2}
      --gpu-memory-utilization ${FAST_GEMMA4_GPU_MEMORY_UTILIZATION:-0.88}
      --host 0.0.0.0 --port 39011

  fast-glm47-flash-sglang:
    <<: *fast-sglang-common
    container_name: sglang-fast-glm47-flash
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39012:39012"
    environment:
      <<: *fast-candidate-env
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      python3 -m sglang.launch_server
      --model-path zai-org/GLM-4.7-Flash
      --served-model-name glm-4.7-flash
      --tool-call-parser glm47
      --reasoning-parser glm45
      --context-length 32768
      --max-running-requests 2
      --mem-fraction-static 0.85
      --trust-remote-code
      --host 0.0.0.0 --port 39012

  fast-glm47-flash-llamacpp:
    <<: *fast-llamacpp-common
    container_name: llamacpp-fast-glm47-flash
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39013:39013"
    environment:
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      -m ${FAST_GLM47_FLASH_GGUF_PATH:-/root/.cache/llama.cpp/hub/models--unsloth--GLM-4.7-Flash-GGUF/snapshots/0d32489ecb9db6d2a4fc93bd27ef01519f95474d/GLM-4.7-Flash-UD-Q4_K_XL.gguf}
      --alias glm-4.7-flash-gguf
      --host 0.0.0.0 --port 39013
      -c 32768
      -ngl 999
      --repeat-penalty 1.0
      --temp 0.7
      --top-p 1.0
      --min-p 0.01

  fast-devstral-small2:
    <<: *fast-vllm-common
    container_name: vllm-fast-devstral-small2
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39014:39014"
    environment:
      <<: *fast-candidate-env
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve mistralai/Devstral-Small-2-24B-Instruct-2512
      --served-model-name devstral-small-2-24b
      --enable-auto-tool-choice
      --tool-call-parser mistral
      --trust-remote-code
      --max-model-len ${FAST_DEVSTRAL_SMALL2_MAX_MODEL_LEN:-32768}
      --max-num-seqs ${FAST_DEVSTRAL_SMALL2_MAX_NUM_SEQS:-4}
      --gpu-memory-utilization ${FAST_DEVSTRAL_SMALL2_GPU_MEMORY_UTILIZATION:-0.85}
      --host 0.0.0.0 --port 39014

  fast-devstral-small2-llamacpp:
    <<: *fast-llamacpp-common
    container_name: llamacpp-fast-devstral-small2
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39015:39015"
    environment:
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      -hf ${FAST_DEVSTRAL_SMALL2_GGUF:-bartowski/mistralai_Devstral-Small-2-24B-Instruct-2512-GGUF}
      --alias devstral-small-2-24b-gguf
      --host 0.0.0.0 --port 39015
      -c 32768
      -ngl 999

  fast-qwen3-30b-a3b:
    <<: *fast-vllm-common
    container_name: vllm-fast-qwen3-30b-a3b
    ports:
      - "${FAST_CANDIDATE_PUBLISH:-127.0.0.1}:39016:39016"
    environment:
      <<: *fast-candidate-env
      CUDA_VISIBLE_DEVICES: ${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_CANDIDATE_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]
              capabilities: [gpu]
    command: >
      serve Qwen/Qwen3-30B-A3B-Instruct-2507
      --served-model-name qwen3-30b-a3b-instruct
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --max-model-len 32768
      --max-num-seqs 2
      --gpu-memory-utilization 0.85
      --host 0.0.0.0 --port 39016

# The weights cache is a pre-created, D:-backed external volume (native ext4, ~15s loads).
# Create it once if it does not exist:  docker volume create vllm-hfcache
volumes:
  vllm-hfcache:
    external: true
  llamacpp-cache:
    external: true
  gepard-postgres-data:
