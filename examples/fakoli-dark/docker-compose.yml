# fakoli-dark serves — the Docker-Compose source of truth for the LIVE (flexibility) tiers.
#
# `anvil-serving serves {status|up|down}` delegates here via serves.toml (docs/adr/0002):
# one `docker compose up -d <service>` per tier. Compose recreates a service natively when
# its config drifts, which fixes the stale-container drift bug the old ad-hoc `docker run`
# scripts had. DO NOT manage these serves with raw `docker`/`docker compose` — go through
# `anvil-serving serves` so the management experience stays consistent.
#
#   heavy  -> service `heavy`  (ThinkingCap Qwen3.6-27B FP8, :30002, RTX PRO 6000 96GB / GPU 1)
#   fast   -> service `fast`   (Gemma 4 E4B IT, vLLM, :30003, RTX 5090 / GPU 0)
#   router -> service `router` (anvil-serving front door, :8000 — see docs/adr/0004)
#
# 2026-07-12 Heavy promotion: ThinkingCap Qwen3.6-27B FP8 replaces GPT-OSS-120B
# after the repeated protocol-v2 quality gate. The old GPT-OSS recipe remains as the
# opt-in `heavy-gptoss-rollback` managed service and in the recipe registry.
# 2026-07-13 Fast swap (gpu-reservations:T006): Gemma 4 E4B IT replaces Qwen3.6-35B-A3B-NVFP4
# as the resident fast serve so the multi-tenant 5090 (always-on voice STT/TTS sidecars,
# ADR-0017) keeps declared VRAM headroom. The 35B recipe remains as the opt-in
# `fast-qwen36-rollback` managed service. These replaced the
# agentic-mode tiers (sglang/qwen35-awq + gpt-oss-20b), which live in git history. The
# convention also shifted: weights now resolve as HF REPO-IDS from the
# `vllm-hfcache` docker volume (the `anvil-serving models pull` path) — NOT `/models/<dir>`
# bind paths from `fakoli-models`. A named volume is native ext4 inside WSL2 (~15s loads); a
# C:/ bind rides 9P and turns a cold load into 20-90 min (CLAUDE.md gotcha #15).
#
# `router` is the only service published beyond loopback (ADR-0004). `heavy`/`fast` stay
# loopback-only and are reached by the router over host.docker.internal:<port> (the router's
# config volume; see the anvil-router-cfg volume, edited via `anvil-serving`).
#
# GPU UUIDs (env-overridable; default to THIS box so the file runs unchanged):
#   HEAVY_GPU_UUID  default GPU-d0f446cf-1771-414c-e116-a39138798a8c (RTX PRO 6000 96GB)
#   FAST_GPU_UUID   default GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1 (RTX 5090)
# Find yours with `nvidia-smi --query-gpu=index,uuid --format=csv` (or `anvil-serving doctor`).
services:
  # Heavy tier: ThinkingCap Qwen3.6-27B FP8 on vLLM (RTX PRO 6000 / GPU 1, :30002).
  heavy:
    image: ${HEAVY_THINKINGCAP_VLLM_IMAGE:-vllm/vllm-openai@sha256:907377dddef392f6b679d9c071e1c33c3935b4dc993b61d0352e391a5319ff3e}
    container_name: vllm-thinkingcap-heavy
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      # Loopback-only: unauthenticated vLLM endpoint must not be LAN-exposed (gotcha #1 / SECURITY.md).
      - "127.0.0.1:30002:30002"
    volumes:
      # Weights resolved as an HF repo-id from the native-ext4 vllm-hfcache volume (never a C:/ 9P bind).
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      # Pin the PRO 6000 by UUID (WSL2 ignores compose device_ids isolation — gotcha #13).
      CUDA_VISIBLE_DEVICES: ${HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}   # RTX PRO 6000 96GB
      # Mandatory on this WSL2 box: no UVA -> vLLM v2 runner's UvaBuffer dies (gotcha #14).
      VLLM_USE_V2_MODEL_RUNNER: "0"
      # The tested FP8 path fails through DeepGEMM on this sm_120 recipe.
      VLLM_USE_DEEP_GEMM: "0"
      # MAKE-OR-BREAK on sm_120: the `f` suffix; plain 12.0 -> `cvt.e2m1x2.f32 not supported`.
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      # Weights are already in vllm-hfcache, but vLLM still does an HF-hub metadata check at
      # startup; a token authenticates it (avoids the anonymous rate-limit warning). By-reference,
      # empty if unset (set HF_TOKEN in your shell/.env before `anvil-serving serves up`).
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}"]   # RTX PRO 6000 96GB
              capabilities: [gpu]
    # Pin entrypoint because upstream image defaults have changed across releases.
    entrypoint: ["vllm"]
    command: >
      serve bottlecapai/ThinkingCap-Qwen3.6-27B-FP8
      --revision ${HEAVY_THINKINGCAP_REVISION:-e48255afd77b403446332be0f595868337b36591}
      --served-model-name thinkingcap-qwen36-27b-fp8
      --trust-remote-code
      --language-model-only
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --speculative-config '{"method":"mtp","num_speculative_tokens":${HEAVY_THINKINGCAP_MTP_TOKENS:-3}}'
      --no-enable-prefix-caching
      --kv-cache-dtype fp8
      --max-model-len ${HEAVY_THINKINGCAP_MAX_MODEL_LEN:-262144}
      --max-num-seqs ${HEAVY_THINKINGCAP_MAX_NUM_SEQS:-5}
      --gpu-memory-utilization 0.92
      --host 0.0.0.0 --port 30002
      ${HEAVY_THINKINGCAP_EXTRA_ARGS:-}

  # Opt-in rollback for Heavy. It deliberately shares :30002 and the PRO 6000,
  # so stop `heavy` before starting it. It is never a router dependency.
  heavy-gptoss-rollback:
    profiles: ["rollback"]
    image: ${HEAVY_GPTOSS_VLLM_IMAGE:-vllm/vllm-openai@sha256:907377dddef392f6b679d9c071e1c33c3935b4dc993b61d0352e391a5319ff3e}
    container_name: vllm-gptoss120
    restart: unless-stopped
    ipc: host
    ports:
      - "127.0.0.1:30002:30002"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${HEAVY_GPU_UUID:-GPU-d0f446cf-1771-414c-e116-a39138798a8c}"]
              capabilities: [gpu]
    entrypoint: ["vllm"]
    command: >
      serve openai/gpt-oss-120b
      --revision ${HEAVY_GPTOSS_REVISION:-b5c939de8f754692c1647ca79fbf85e8c1e70f8a}
      --served-model-name gpt-oss-120b
      --kv-cache-dtype fp8
      --tool-call-parser openai
      --enable-auto-tool-choice
      --gpu-memory-utilization 0.88
      --max-model-len 131072
      --host 0.0.0.0 --port 30002

  # Fast tier: Gemma 4 E4B IT (bf16) on vLLM (RTX 5090 / GPU 0, :30003) — gpu-reservations:T006,
  # promoted from the docker-compose.experiment.yml `voice-gemma4-e4b` candidate recipe.
  #
  # ADR-0017 reservation: serves.toml declares gpu_role "dark-fast" / vram_mib 18432 /
  # residency "resident" for this serve. --gpu-memory-utilization below is
  # 18432 / 32607 CAPACITY = 0.5653, deliberately NOT the T003
  # reservations.derive_gpu_memory_utilization value (18432 / (capacity - reserve) = 0.7103):
  # vLLM applies the fraction to TOTAL device memory, so dividing by the post-reserve budget
  # over-allocates by capacity/budget (measured 2026-07-13: 0.7103 -> engine held ~23.9 GiB,
  # 5.5 GiB past the declared reservation). Keep vram_mib and this fraction in lockstep.
  # Measured floor (2026-07-13): vLLM reports "Model loading took 15.18 GiB" for this bf16
  # checkpoint (no per-layer-embedding offload in vLLM), so a smaller reservation cannot load;
  # at 0.5653 the engine reports 2.29 GiB free for KV (~125k tokens, ample for the 32K window).
  #
  # GPU pin: INDEX, not UUID — the gemma4-unified image int()-parses CUDA_VISIBLE_DEVICES at
  # import (vllm/kernels/oink_ops.py via platforms/interface.py device_id_to_physical_device_id)
  # and crashes on a UUID value (CLAUDE.md gotcha #21). CUDA_DEVICE_ORDER=PCI_BUS_ID makes
  # index 0 deterministically the 5090 (bus 01:00.0 < 03:00.0). The compose device_ids
  # reservation below still names the UUID, but WSL2 ignores that isolation (gotcha #13) —
  # the env pin is the one that counts.
  fast:
    image: ${FAST_GEMMA4_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: vllm-gemma4-e4b-fast
    restart: unless-stopped
    ipc: host
    ports:
      - "127.0.0.1:30003:30003"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GEMMA4_CUDA_DEVICE:-0}   # RTX 5090 by PCI order (see pin note above)
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      # Authenticate the startup HF-hub metadata check (weights are already cached). Empty if unset.
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]   # RTX 5090
              capabilities: [gpu]
    entrypoint: ["vllm"]
    # Revision is PINNED: the HF repo's `main` ref (a4c2d58…) is a metadata-only refresh whose
    # snapshot has NO model.safetensors in the vllm-hfcache volume; fee6332… is the cached
    # weights snapshot. Unpinned, a cold start tries to re-download 15 GB.
    command: >
      serve google/gemma-4-E4B-it
      --revision ${FAST_GEMMA4_REVISION:-fee6332c1abaafb77f6f9624236c63aa2f1d0187}
      --served-model-name gemma4-e4b-it
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --max-model-len 32768
      --gpu-memory-utilization 0.5653
      --host 0.0.0.0 --port 30003

  # Opt-in rollback for Fast (gpu-reservations:T006, mirroring heavy-gptoss-rollback): the
  # pre-swap Qwen3.6-35B-A3B-NVFP4 recipe. It deliberately shares :30003 and the 5090, so
  # `serves down fast` before starting it. It is never a router dependency.
  # NOT in the ADR-0017 ledger: its legacy 0.85 utilization (~27.7 GiB of 32.6) predates the
  # always-on voice sidecars (~4.3 GiB) and cannot coexist with them — for a rollback with the
  # sidecars up, set FAST_QWEN36_GPU_UTIL=0.78 or lower, or stop the sidecars first
  # (`anvil-serving voice audio down`). See serves.toml for the full rollback runbook.
  fast-qwen36-rollback:
    profiles: ["rollback"]
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen36
    restart: unless-stopped
    ipc: host
    ports:
      - "127.0.0.1:30003:30003"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}   # RTX 5090
      VLLM_USE_V2_MODEL_RUNNER: "0"
      # Make-or-break on sm_120 for the NVFP4 kernels; plain 12.0 can select unsupported codegen.
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      # Authenticate the startup HF-hub metadata check (weights are already cached). Empty if unset.
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]   # RTX 5090
              capabilities: [gpu]
    entrypoint: ["vllm"]
    # nvidia/*-NVFP4 is modelopt-packed -> --quantization modelopt_fp4 (gotcha #10). Qwen NVFP4
    # needs the qwen3 reasoning/tool parsers + trust-remote-code. The pre-swap 35B-A3B recipe
    # keeps 32K ctx / max-num-seqs 2 inside the 5090's 32GB envelope.
    command: >
      serve nvidia/Qwen3.6-35B-A3B-NVFP4
      --served-model-name qwen36-35b-a3b-nvfp4
      --quantization modelopt_fp4
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --max-model-len 32768
      --max-num-seqs 2
      --gpu-memory-utilization ${FAST_QWEN36_GPU_UTIL:-0.85}
      --host 0.0.0.0 --port 30003

  # ── Purpose-model serves (gpu-reservations:T009, ADR-0017 §7) ──
  # Always-on text-embedding + reranker serves sharing the multi-tenant RTX 5090 with the
  # fast tier and the voice sidecars. Both are 0.6B bf16 checkpoints on the SAME pinned vLLM
  # image as `heavy` (a standard image, so the UUID pin applies — gotcha #13; the index-pin
  # exception is gemma4-unified-specific, gotcha #21).
  #
  # ADR-0017 reservations: serves.toml declares gpu_role "dark-fast" / residency "resident"
  # with vram_mib 3200 (embeddings) and 3456 (reranker). --gpu-memory-utilization below is
  # vram_mib / 32607 CAPACITY (fraction of TOTAL device memory — see the `fast` deviation
  # note above): 0.0981 = 3200/32607 and 0.1060 = 3456/32607. Keep vram_mib and the
  # fraction in lockstep.
  #
  # HONEST-MEASURED floor (2026-07-13, single-instance): each engine reports
  # "Model loading took 1.12 GiB" of weights plus a ~1.70-1.75 GiB fixed runtime floor
  # (WSL2 CUDA context + torch/cuBLAS/NCCL workspaces + profiled activation peak) BEFORE
  # any KV — a 3072 MiB budget left only 0.17-0.18 GiB of KV, below even a 2048-token
  # window (vLLM: "estimated maximum model length is 1568-1728"). The windows below are
  # sized to the measured remainder: embeddings 2048 tokens (0.22 GiB KV vs ~0.35 available
  # at 3200), reranker 4096 tokens (0.44 GiB KV vs ~0.55 available at 3456) — retrieval
  # chunks are short; rerank candidate docs run longer. --enforce-eager skips CUDA-graph
  # capture (pooling serves never decode, so graphs buy nothing and their memory would eat
  # the KV margin); --max-num-batched-tokens caps the chunked-prefill activation peak.
  #
  # Publish: loopback-only by default (ADR-0004 — unauthenticated endpoints stay off the
  # LAN). Opt in to tailnet exposure per serve by setting EMBEDDINGS_PUBLISH /
  # RERANKER_PUBLISH to this host's tailnet address (e.g. 100.87.34.66) before `serves up`.
  embeddings:
    image: ${EMBEDDINGS_VLLM_IMAGE:-vllm/vllm-openai@sha256:907377dddef392f6b679d9c071e1c33c3935b4dc993b61d0352e391a5319ff3e}
    container_name: vllm-qwen3-embedding
    restart: unless-stopped
    ipc: host
    ports:
      - "${EMBEDDINGS_PUBLISH:-127.0.0.1}:30005:30005"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}   # RTX 5090
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      # Authenticate the startup HF-hub metadata check (weights are already cached). Empty if unset.
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]   # RTX 5090
              capabilities: [gpu]
    entrypoint: ["vllm"]
    # --runner pooling --convert embed: this vLLM (0.23) replaced the old `--task embed`
    # spelling. 2048-token window is a deliberate serving cap (retrieval chunks), not the
    # model's 32K max — it bounds the KV floor inside the 3200 MiB reservation (see the
    # measured-floor note above).
    command: >
      serve Qwen/Qwen3-Embedding-0.6B
      --revision ${EMBEDDINGS_REVISION:-97b0c614be4d77ee51c0cef4e5f07c00f9eb65b3}
      --served-model-name qwen3-embedding-0.6b
      --runner pooling
      --convert embed
      --max-model-len 2048
      --max-num-batched-tokens 2048
      --max-num-seqs 16
      --enforce-eager
      --gpu-memory-utilization 0.0981
      --host 0.0.0.0 --port 30005

  reranker:
    image: ${RERANKER_VLLM_IMAGE:-vllm/vllm-openai@sha256:907377dddef392f6b679d9c071e1c33c3935b4dc993b61d0352e391a5319ff3e}
    container_name: vllm-qwen3-reranker
    restart: unless-stopped
    ipc: host
    ports:
      - "${RERANKER_PUBLISH:-127.0.0.1}:30006:30006"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}   # RTX 5090
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]   # RTX 5090
              capabilities: [gpu]
    entrypoint: ["vllm"]
    # The upstream vLLM recipe for the original Qwen3-Reranker checkpoints: override the
    # architecture to Qwen3ForSequenceClassification so the pooling runner serves it as a
    # cross-encoder scorer (/rerank, /score), with classifier_from_token +
    # is_original_qwen3_reranker mapping the "yes"/"no" LM-head tokens to the relevance score.
    command: >
      serve Qwen/Qwen3-Reranker-0.6B
      --revision ${RERANKER_REVISION:-e61197ed45024b0ed8a2d74b80b4d909f1255473}
      --served-model-name qwen3-reranker-0.6b
      --runner pooling
      --hf-overrides '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
      --max-model-len 4096
      --max-num-batched-tokens 2048
      --max-num-seqs 8
      --enforce-eager
      --gpu-memory-utilization 0.1060
      --host 0.0.0.0 --port 30006

  # ── OCR serve (gpu-reservations:T011) ──
  # PaddleOCR-VL-1.6 (0.9B, bf16, arch paddleocr_vl) on the multi-tenant RTX 5090:
  # the document-parsing VLM behind the router's "ocr" intent preset (tier
  # ocr-local -> :30007). Serves OpenAI chat completions with image content —
  # send the task prompt ("OCR:", "Table Recognition:", ...) plus the page image
  # (vLLM recipe: docs.vllm.ai/projects/recipes -> PaddlePaddle/PaddleOCR-VL;
  # native vllm support since v0.11.1 — the pinned nightly digest has it).
  #
  # ADR-0017 reservation: serves.toml declares gpu_role "dark-fast" / vram_mib 4096 /
  # residency "resident" for this serve. --gpu-memory-utilization below is
  # 4096 / 32607 CAPACITY = 0.1256 (fraction of TOTAL device memory — see the
  # `fast` deviation note above). Keep vram_mib and the fraction in lockstep.
  # HONEST-MEASURED (2026-07-13, this box): weights load at 1.79 GiB bf16 plus
  # the ~1.7-1.9 GiB fixed vLLM/WSL2 runtime floor (CUDA context + torch
  # workspaces + the multimodal-profiling activation peak) before any KV — at
  # 4096 MiB the engine reports ~0.29 GiB free for KV (~16.9k tokens), exactly
  # covering the 16384-token window (GQA KV is tiny: 2 kv-heads x 18 layers).
  # --enforce-eager skips CUDA-graph capture (its memory would eat the KV
  # margin; a 0.9B decoder is fast eager). --no-enable-prefix-caching +
  # --mm-processor-cache-gb 0 per the upstream recipe (OCR pages don't repeat,
  # so cache memory buys nothing). sm_120 note: bf16 DENSE is the proven-safe
  # path (CLAUDE.md gotchas #7/#16 concern FP8-MoE / NVFP4-MoE kernels, not
  # this shape); VLLM_USE_V2_MODEL_RUNNER=0 stays mandatory (gotcha #14).
  #
  # Publish: loopback-only by default (ADR-0004). Opt in to tailnet exposure by
  # setting OCR_PUBLISH to this host's tailnet address before `serves up`.
  ocr:
    image: ${OCR_VLLM_IMAGE:-vllm/vllm-openai@sha256:907377dddef392f6b679d9c071e1c33c3935b4dc993b61d0352e391a5319ff3e}
    container_name: vllm-paddleocr-vl
    restart: unless-stopped
    ipc: host
    ports:
      - "${OCR_PUBLISH:-127.0.0.1}:30007:30007"
    volumes:
      - "vllm-hfcache:/root/.cache/huggingface"
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: ${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}   # RTX 5090
      VLLM_USE_V2_MODEL_RUNNER: "0"
      FLASHINFER_CUDA_ARCH_LIST: "12.0f"
      # Authenticate the startup HF-hub metadata check (weights are already cached). Empty if unset.
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${FAST_GPU_UUID:-GPU-04d3b6e7-5691-3e86-1d34-c37999440cf1}"]   # RTX 5090
              capabilities: [gpu]
    entrypoint: ["vllm"]
    # Revision PINNED to the vllm-hfcache snapshot pulled by `models pull` (66317ac…);
    # unpinned, a refreshed HF `main` ref would force a cold re-download at `up`.
    # --trust-remote-code: the checkpoint's config/processor classes are custom code
    # (auto_map) even though the model architecture itself is vLLM-native.
    command: >
      serve PaddlePaddle/PaddleOCR-VL-1.6
      --revision ${OCR_PADDLEOCR_REVISION:-66317acc4c9fc17bd154591ce650735cd2855f3e}
      --served-model-name paddleocr-vl-1.6
      --trust-remote-code
      --max-model-len 16384
      --max-num-batched-tokens 16384
      --max-num-seqs 4
      --no-enable-prefix-caching
      --mm-processor-cache-gb 0
      --enforce-eager
      --gpu-memory-utilization 0.1256
      --host 0.0.0.0 --port 30007

  # Router: single network-facing, token-authed endpoint (ADR-0004). Reaches heavy/fast over
  # host.docker.internal:<port>. Pinned to the DEPLOYED RELEASE image anvil-serving:0.12.0
  # (rebuilt from main — flexibility-mode + the v2 profile loader, which is backward-compatible
  # with the live v1 profile) and a config VOLUME (anvil-router-cfg). Pin the released TAG (not
  # `build:`) so `up` reproduces the deployment and `router promote --image` validates against it.
  # Bump this tag + router_manage.DEFAULT_IMAGE together on each router release.
  # ROUTER_IMAGE is a per-invocation CANDIDATE override for pre-release router verification
  # (e.g. `ROUTER_IMAGE=anvil-serving:0.13.0rc1 anvil-serving router up`); a bare `up` always
  # reproduces the pinned release.
  router:
    image: ${ROUTER_IMAGE:-anvil-serving:0.12.0}
    container_name: anvil-router
    restart: unless-stopped
    depends_on:
      - heavy
      - fast
    ports:
      - "${ROUTER_PUBLISH:-127.0.0.1}:8000:8000"
    environment:
      ANVIL_ROUTER_TOKEN: ${ANVIL_ROUTER_TOKEN:-}
    volumes:
      # Config + promoted profile live in the anvil-router-cfg volume (/etc/anvil), read-only
      # into the container, edited out-of-band via `anvil-serving router promote` (ADR-0012).
      # SEED IT on a fresh host before the first `up`: an EMPTY volume has no config.toml so the
      # router crash-loops; on an UPGRADE the persisted volume may still hold OLD tier ports, so
      # re-promote the current config (`router promote --config`) after changing the topology.
      - "anvil-router-cfg:/etc/anvil:ro"

volumes:
  # Model weights (HF cache). External so `down -v` can never delete the pulled weights.
  vllm-hfcache:
    external: true
  # Router config + profile. External so it survives recreates and is edited independently.
  anvil-router-cfg:
    external: true
