# Live fakoli-dark voice manifest for the local-loop proof harness.
#
# This is intentionally operator-specific: it points at the deployed router on
# the tailnet plus the already-running local STT/TTS sidecars. Secrets are env
# var names only; never paste token values here.

[voice]
name = "anvil-voice-fakoli-dark"
realtime_host = "127.0.0.1"
realtime_port = 8765

[voice.llm]
base_url = "http://100.87.34.66:8000/v1"
# Route live Talk turns through the Fast preset; the router resolves it to the
# current human-gated Fast served model on fakoli-dark.
model = "chat-fast"
stream = true
api_key_env = "ANVIL_ROUTER_TOKEN"
expected_endpoint_host = "100.87.34.66"
expected_route_provider = "fast-local"
expected_route_model = "qwen36-35b-a3b-nvfp4"
expected_route_tier = "local"

[voice.stt]
base_url = "http://127.0.0.1:30010/v1"
model = "tdt-0.6b-v3"
stream = false
lifecycle = "external"

[voice.tts]
base_url = "http://127.0.0.1:30011/v1"
model = "kokoro"
lifecycle = "external"

[voice.profiles.gepard-fast-tts.tts]
base_url = "http://127.0.0.1:39111"
model = "gepard-1.0"
protocol = "gepard"
timeout = 120.0
lifecycle = "managed"
serve_name = "tts-gepard-fast"
manifest_path = "examples/fakoli-dark/serves.toml"
response_format = "pcm"
source_sample_rate = 22050
target_sample_rate = 16000
