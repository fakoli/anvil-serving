model = "qwen3-32b-nvfp4"
api_key_env = "ANVIL_CANDIDATE_LLM_TOKEN"
expected_endpoint_host = "100.87.34.66"
expected_route_provider = "direct-vllm"
expected_route_model = "qwen3-32b-nvfp4"
expected_route_tier = "candidate"

