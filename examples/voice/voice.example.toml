# anvil-serving voice manifest (reference example)
#
# Describes the anvil-style stdlib VAD -> STT -> LLM -> TTS orchestrator + its
# OpenAI Realtime-compatible server. The intended deployment goal is that a
# server-to-server Realtime voice client can point at Anvil's `/v1/realtime`
# endpoint instead of the hosted OpenAI Realtime endpoint. See docs/VOICE-REALTIME.md
# for the replacement contract and known subset.
#
# Hygiene (enforced by anvil_serving.voice.config.validate_manifest):
#   - 127.0.0.1, never localhost (Windows IPv6 stall -- CLAUDE.md gotcha #1).
#   - Secrets are referenced by ENV-VAR NAME only (the `*_env` keys below);
#     never paste a literal key/token/secret/password into this file.
#   - No URL-embedded credentials (https://user:pass@host/...).
#
# STT and TTS are OUT-OF-PROCESS serves speaking the OpenAI audio
# sub-protocols (/v1/audio/transcriptions, /v1/audio/speech) -- this manifest
# only points at them; it does not describe how they're launched (that's
# `anvil-serving serves`, reused by a later voice unit).

[voice]
name = "anvil-voice"
realtime_host = "127.0.0.1"   # the Realtime WebSocket server binds here (never localhost)
realtime_port = 8765
# pool_size = 4                        # concurrent Realtime sessions (anvil_serving.voice.realtime.pool)
# realtime_token_env = "ANVIL_VOICE_REALTIME_TOKEN"  # required if realtime_host is non-loopback (LAN/tailnet)

# The brain: OpenAI Chat Completions ONLY (never the Responses API), pointed
# at the anvil router by default so every voice turn inherits anvil's
# work-class routing + structural verify + cloud fallback with zero glue.
[voice.llm]
base_url = "http://127.0.0.1:8000/v1"
model = "chat-fast"            # an anvil intent preset (see anvil_serving/router/intent.py) --
                                # low-latency, routed fast-tier-first (flexibility:T018)
stream = true
api_key_env = "ANVIL_ROUTER_TOKEN"   # env var holding the router's bearer token; optional

# Out-of-process STT serve (e.g. parakeet.cpp or a vLLM /v1/audio/transcriptions
# endpoint -- see the sm_120 guidance in the review doc).
[voice.stt]
base_url = "http://127.0.0.1:8090/v1"
model = "parakeet-tdt-0.6b-v3"
api_key_env = "ANVIL_VOICE_STT_TOKEN"   # optional; omit if the serve is unauthenticated

# Out-of-process TTS serve (e.g. Kokoro-FastAPI /v1/audio/speech).
[voice.tts]
base_url = "http://127.0.0.1:8091/v1"
model = "kokoro-82m"
api_key_env = "ANVIL_VOICE_TTS_TOKEN"   # optional; omit if the serve is unauthenticated
