# Voice audio serves (STT/TTS) for the OpenClaw Talk reference topology.
# SEPARATE from serves.toml on purpose: these are always-on audio services
# owned by `anvil-serving voice audio up/down` (the host voice manifest points
# here via manifest_path). Generic `serves down` / serves_manage hygiene over
# serves.toml must never stop them - that is exactly the outage this split fixes.

# Published on Dark loopback (30010/30011) and the tailnet bridge ports
# (100.87.34.66:30110/30111) that Mini's realtime proxy targets.
[[serve]]
name = "stt"                   # parakeet.cpp tdt-0.6b-v3 (RTX 5090)
container = "anvil-voice-stt"
port = 30010
model = "tdt-0.6b-v3"
engine = "audio"
groups = ["voice"]             # serve groups (serves up/down/status --group)
up = "docker compose -f {dir}/docker-compose.voice-audio.yml up -d stt"

[[serve]]
name = "tts"                   # kokoro-fastapi (RTX 5090)
container = "anvil-voice-tts"
port = 30011
model = "kokoro"
engine = "audio"
health = "/health"
groups = ["voice"]             # serve groups (serves up/down/status --group)
up = "docker compose -f {dir}/docker-compose.voice-audio.yml up -d tts"
