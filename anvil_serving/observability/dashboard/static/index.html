<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Anvil System View</title>
  <style>
    :root{color-scheme:dark;--bg:#0a0d12;--panel:#111720;--panel-2:#151d28;--line:#273140;--text:#eef3f8;--muted:#91a0b2;--ok:#52d6a3;--warn:#f5ba64;--bad:#ff7185;--accent:#7aa7ff;--accent-soft:#172942}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 85% -10%,#17253a 0,transparent 34%),var(--bg);color:var(--text);font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}main{max-width:1500px;margin:auto;padding:28px}.mast{display:flex;justify-content:space-between;align-items:end;border-bottom:1px solid var(--line);padding-bottom:20px}.mast h1{font-size:30px;letter-spacing:-.04em;margin:0}.mast p{margin:5px 0 0;color:var(--muted)}#freshness{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--muted)}.auth{display:none;align-items:end;gap:10px;margin:14px 0;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}.auth.visible{display:flex}.auth label{display:grid;gap:5px;flex:1;color:var(--muted);font-size:12px}.auth input,.toolbar input,.toolbar select,.benchmark select{width:100%;padding:9px 10px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:6px}.auth button{padding:9px 14px;border:1px solid #5278bd;border-radius:6px;background:#203961;color:var(--text);cursor:pointer}.banner{display:none;margin:14px 0;padding:11px 14px;border:1px solid #693c45;background:#26151a;color:#ffb7c1;border-radius:8px}.tabs{display:flex;gap:4px;margin:18px 0 20px;border-bottom:1px solid var(--line)}.tab{appearance:none;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--muted);padding:10px 16px;cursor:pointer;font-weight:650}.tab:hover{color:var(--text)}.tab[aria-selected="true"]{color:var(--text);border-color:var(--accent)}.tab:focus-visible,.auth button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.view[hidden]{display:none}.overview{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.025),transparent),var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 13px}.summary{grid-column:span 12;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;padding:0;overflow:hidden;background:var(--line)}.stat{background:var(--panel);padding:16px;min-width:0}.stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.stat-value{margin-top:7px;font:22px/1.15 ui-monospace,SFMono-Regular,Consolas,monospace;overflow:hidden;text-overflow:ellipsis}.stat-value.warning,.curve-value.warning,.probe-reading.warning{color:var(--warn)}.stat-value.critical,.curve-value.critical,.probe-reading.critical{color:var(--bad)}.charts-panel{grid-column:span 8}.curves{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.curve{background:var(--panel-2);border:1px solid rgba(145,160,178,.14);border-radius:8px;padding:13px;min-width:0}.curve-head{display:flex;justify-content:space-between;gap:12px;align-items:start}.curve-title{color:var(--text);font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.curve-meta{margin-top:2px;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.curve-value{color:var(--accent);font:18px/1 ui-monospace,SFMono-Regular,Consolas,monospace;white-space:nowrap}.curve svg{display:block;width:100%;height:94px;margin-top:13px;border-bottom:1px solid var(--line)}.curve polyline{fill:none;stroke:var(--accent);stroke-width:2;vector-effect:non-scaling-stroke}.curve.warning polyline{stroke:var(--warn)}.curve.critical polyline{stroke:var(--bad)}.curve-range{display:flex;justify-content:space-between;margin-top:7px;color:var(--muted);font:10px ui-monospace,SFMono-Regular,Consolas,monospace}.side-stack{grid-column:span 4;display:grid;gap:14px;align-content:start}.benchmark{grid-column:span 12}.benchmark label{display:grid;gap:6px;color:var(--muted);font-size:12px;max-width:620px}.rows{display:grid;gap:8px}.row{display:grid;grid-template-columns:minmax(110px,1fr) auto;gap:12px;border-top:1px solid rgba(145,160,178,.13);padding-top:8px}.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.value{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--accent);text-align:right}.state{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:8px}.degraded .state,.state.degraded{background:var(--warn)}.failed .state,.state.failed{background:var(--bad)}.empty{color:var(--muted);font-style:italic}.probe-panel{padding:0;overflow:hidden}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 210px auto;gap:10px;align-items:end;padding:16px;border-bottom:1px solid var(--line)}.toolbar label{display:grid;gap:5px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.probe-count{padding:9px 0;color:var(--muted);font:12px ui-monospace,SFMono-Regular,Consolas,monospace;white-space:nowrap}.probe-list{max-height:calc(100vh - 270px);min-height:320px;overflow:auto}.probe-row{display:grid;grid-template-columns:12px minmax(240px,1.4fr) minmax(150px,.8fr) minmax(120px,.5fr);gap:12px;align-items:center;padding:11px 16px;border-top:1px solid rgba(145,160,178,.1)}.probe-row:first-child{border-top:0}.probe-row:hover{background:rgba(122,167,255,.045)}.probe-identity{min-width:0}.probe-metric{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.probe-labels,.probe-source{color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.probe-reading{text-align:right;font:12px ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--accent);overflow-wrap:anywhere}.probe-status{text-align:right;color:var(--muted);font-size:11px}.probe-status.failed{color:var(--bad)}.probe-status.degraded{color:var(--warn)}@media(max-width:1050px){.charts-panel,.side-stack{grid-column:span 12}.side-stack{grid-template-columns:repeat(2,minmax(0,1fr))}.summary{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){main{padding:16px}.mast{align-items:start;gap:14px;flex-direction:column}.auth{align-items:stretch;flex-direction:column}.tabs{margin-top:14px}.tab{flex:1}.summary{grid-template-columns:1fr 1fr}.curves,.side-stack{grid-template-columns:1fr}.curve-head{flex-direction:column}.curve-title{white-space:normal}.toolbar{grid-template-columns:1fr}.probe-count{padding:0}.probe-list{max-height:none}.probe-row{grid-template-columns:12px minmax(0,1fr) auto;gap:8px}.probe-source{grid-column:2}.probe-status{display:none}.row{grid-template-columns:minmax(0,1fr);gap:4px}.name{white-space:normal;overflow-wrap:anywhere}.value{text-align:left;padding-left:15px;overflow-wrap:anywhere}.stat-value{font-size:18px}}
    .charts-panel{grid-column:span 12}.side-stack{grid-column:span 12;grid-template-columns:repeat(2,minmax(0,1fr))}.chart-groups{display:grid;gap:22px}.chart-section{display:grid;gap:10px}.chart-section+.chart-section{border-top:1px solid var(--line);padding-top:20px}.chart-section-head{display:flex;justify-content:space-between;gap:14px;align-items:baseline}.chart-section-head h3{margin:0;font-size:14px;letter-spacing:-.01em}.chart-section-head p{margin:0;color:var(--muted);font-size:11px;text-align:right}.chart-section .curves{grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}@media(max-width:700px){.side-stack{grid-template-columns:1fr}.chart-section-head{align-items:start;flex-direction:column;gap:2px}.chart-section-head p{text-align:left}.chart-section .curves{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <header class="mast"><div><h1>Anvil system view</h1><p>Whole-topology pressure and serving state</p></div><div id="freshness">Connecting…</div></header>
  <form id="auth" class="auth" autocomplete="off"><label for="token">Dashboard bearer token<input id="token" name="token" type="password" required autocomplete="current-password" placeholder="Paste the configured token"></label><button type="submit">Connect</button></form>
  <div id="error" class="banner" role="alert"></div>
  <nav class="tabs" role="tablist" aria-label="Dashboard views">
    <button id="overview-tab" class="tab" type="button" role="tab" aria-selected="true" aria-controls="overview" data-tab="overview">Overview</button>
    <button id="probes-tab" class="tab" type="button" role="tab" aria-selected="false" aria-controls="probes" data-tab="probes">Probes</button>
  </nav>
  <section id="overview" class="view overview" role="tabpanel" aria-labelledby="overview-tab">
    <article id="summary" class="panel summary" aria-label="Current system readings"></article>
    <article class="panel charts-panel"><h2>System graphs</h2><div id="curves" class="chart-groups"></div></article>
    <div class="side-stack">
      <article class="panel"><h2>Model loading transition</h2><div id="loading" class="rows"></div></article>
      <article class="panel"><h2>Pressure & freshness</h2><div id="indicators" class="rows"></div></article>
    </div>
    <article class="panel benchmark"><h2>Benchmark comparison</h2><label for="session">Retained session<select id="session"><option value="">No retained session</option></select></label><div id="comparison" class="rows"></div></article>
  </section>
  <section id="probes" class="view" role="tabpanel" aria-labelledby="probes-tab" hidden>
    <article class="panel probe-panel">
      <div class="toolbar">
        <label for="probe-search">Search probes<input id="probe-search" type="search" placeholder="Metric, host, label, or value"></label>
        <label for="probe-category">Category<select id="probe-category"><option value="all">All probes</option></select></label>
        <div id="probe-count" class="probe-count" aria-live="polite">0 probes</div>
      </div>
      <div id="probe-list" class="probe-list" aria-label="Available telemetry probes"></div>
    </article>
  </section>
</main>
<script>
const categories={host:'Host',boundary:'WSL & Docker',gpu:'GPU',container:'Containers',service:'Services'};
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const numeric=v=>typeof v==='number'&&Number.isFinite(v);
const displayValue=(value,unit='')=>{if(value===null||value===undefined)return'—';if(unit==='bytes'&&numeric(value)){const scales=[['TiB',1024**4],['GiB',1024**3],['MiB',1024**2],['KiB',1024]];const scale=scales.find(([,size])=>Math.abs(value)>=size);if(scale)return`${new Intl.NumberFormat(undefined,{maximumFractionDigits:1}).format(value/scale[1])} ${scale[0]}`}return`${numeric(value)?new Intl.NumberFormat(undefined,{maximumFractionDigits:1}).format(value):value}${unit?' '+unit:''}`};
const categoryOf=sample=>Object.keys(categories).find(prefix=>sample.metric.startsWith(prefix+'.'))||'other';
let authToken=sessionStorage.getItem('anvil-dashboard-token')||'';
let allSamples=[];
let activeTab='overview';
const PROBE_RENDER_LIMIT=500;
const authForm=document.getElementById('auth');
const apiFetch=(path,options={})=>fetch(path,{...options,headers:{...(options.headers||{}),...(authToken?{Authorization:`Bearer ${authToken}`}:{})}});
function requireToken(message='Enter the configured dashboard token to view telemetry.'){authForm.classList.add('visible');const banner=document.getElementById('error');banner.textContent=message;banner.style.display='block';document.getElementById('freshness').textContent='Authentication required'}
function statusClass(status){return status==='ok'?'':(['failed','permission-denied'].includes(status)?'failed':'degraded')}
function activateTab(name){activeTab=name;document.querySelectorAll('[data-tab]').forEach(tab=>tab.setAttribute('aria-selected',String(tab.dataset.tab===name)));document.querySelectorAll('.view').forEach(view=>view.hidden=view.id!==name);if(name==='probes'){renderProbeExplorer();document.getElementById('probe-search').focus({preventScroll:true})}}
function labelsText(labels){return Object.entries(labels||{}).map(([key,value])=>`${key}: ${value}`).join(' · ')}
function sameIdentity(left,right){const leftLabels=left.labels||{},rightLabels=right.labels||{};return left.host_id===right.host_id&&Object.keys(leftLabels).length===Object.keys(rightLabels).length&&Object.entries(leftLabels).every(([key,value])=>rightLabels[key]===value)}
function capacityFor(sample,samples=allSamples){let totalMetric=null;if(sample.metric.endsWith('.used'))totalMetric=sample.metric.slice(0,-5)+'.total';else if(sample.metric.endsWith('.available'))totalMetric=sample.metric.slice(0,-10)+'.total';if(totalMetric){const total=samples.find(candidate=>candidate.metric===totalMetric&&sameIdentity(sample,candidate)&&numeric(candidate.value));if(total)return{value:total.value,unit:total.unit}}if(sample.metric==='host.cpu.utilization'||sample.metric==='gpu.utilization'||sample.metric.endsWith('.memory.pressure'))return{value:100,unit:'percent'};return null}
function capacitySeverity(sample,samples=allSamples){const capacity=capacityFor(sample,samples);if(!capacity||!numeric(sample.value)||capacity.value<=0)return'';const ratio=sample.metric.endsWith('.available')?1-sample.value/capacity.value:sample.value/capacity.value;return ratio>=.9?'critical':ratio>=.75?'warning':''}
function readingFor(sample,samples=allSamples){const current=displayValue(sample.value,sample.unit),capacity=capacityFor(sample,samples);if(!capacity)return current;const percent=numeric(sample.value)&&capacity.value>0?` (${Math.round(sample.value/capacity.value*100)}%)`:'';return`${current} / ${displayValue(capacity.value,capacity.unit)}${percent}`}
function renderSummary(samples){const cpu=samples.find(sample=>sample.metric==='host.cpu.utilization');const hostMemory=samples.find(sample=>sample.metric==='host.memory.used');const boundary=samples.find(sample=>sample.metric==='boundary.memory.used');const gpuUsed=samples.filter(sample=>sample.metric==='gpu.memory.used'&&numeric(sample.value));const gpuTotals=samples.filter(sample=>sample.metric==='gpu.memory.total'&&numeric(sample.value));const gpuSample={metric:'gpu.memory.used',host_id:'all-gpus',labels:{},value:gpuUsed.reduce((sum,sample)=>sum+sample.value,0),unit:'bytes'};const gpuCapacity=gpuTotals.reduce((sum,sample)=>sum+sample.value,0);const gpu=gpuUsed.length?`${displayValue(gpuSample.value,'bytes')} / ${displayValue(gpuCapacity,'bytes')}`:'—';const gpuSeverity=gpuCapacity&&gpuSample.value/gpuCapacity>=.9?'critical':gpuCapacity&&gpuSample.value/gpuCapacity>=.75?'warning':'';const readings=[['CPU',cpu?readingFor(cpu,samples):'—',cpu?capacitySeverity(cpu,samples):''],['Host memory',hostMemory?readingFor(hostMemory,samples):'—',hostMemory?capacitySeverity(hostMemory,samples):''],['Docker / WSL',boundary?readingFor(boundary,samples):'—',''],['GPU memory',gpu,gpuSeverity]];document.getElementById('summary').innerHTML=readings.map(([label,reading,severity])=>`<div class="stat"><div class="stat-label">${esc(label)}</div><div class="stat-value ${severity}">${esc(reading)}</div></div>`).join('')}
function renderProbeExplorer(){const query=document.getElementById('probe-search').value.trim().toLowerCase();const category=document.getElementById('probe-category').value;const rows=allSamples.filter(sample=>{const haystack=[sample.metric,sample.host_id,sample.collector_id,sample.capability,sample.capability_status,sample.value,sample.unit,labelsText(sample.labels)].join(' ').toLowerCase();return(category==='all'||categoryOf(sample)===category)&&(!query||haystack.includes(query))});const visibleRows=rows.slice(0,PROBE_RENDER_LIMIT);document.getElementById('probe-count').textContent=rows.length>PROBE_RENDER_LIMIT?`${visibleRows.length} shown · ${rows.length} matches · ${allSamples.length} total`:`${rows.length} of ${allSamples.length} probes`;document.getElementById('probe-list').innerHTML=visibleRows.length?visibleRows.map(sample=>{const cls=statusClass(sample.capability_status),severity=capacitySeverity(sample);return `<div class="probe-row"><span class="state ${cls}" title="${esc(sample.capability_status)}"></span><div class="probe-identity"><div class="probe-metric">${esc(sample.metric)}</div><div class="probe-labels">${esc(labelsText(sample.labels)||'No labels')}</div></div><div class="probe-source">${esc(sample.host_id)} · ${esc(categories[categoryOf(sample)]||'Other')}</div><div><div class="probe-reading ${severity}">${esc(readingFor(sample))}</div><div class="probe-status ${cls}">${esc(sample.capability_status)}</div></div></div>`}).join(''):'<div class="empty" style="padding:18px">No probes match this search.</div>'}
function updateCategories(samples){const select=document.getElementById('probe-category');const selected=select.value;const available=[...new Set(samples.map(categoryOf))].sort();select.innerHTML='<option value="all">All probes</option>'+available.map(category=>`<option value="${esc(category)}">${esc(categories[category]||'Other')}</option>`).join('');select.value=available.includes(selected)||selected==='all'?selected:'all'}
async function refresh(){try{const response=await apiFetch('/v1/metrics',{cache:'no-store'});if(response.status===401){authToken='';sessionStorage.removeItem('anvil-dashboard-token');requireToken('The dashboard token was missing or rejected.');return false}if(!response.ok)throw new Error(`metrics HTTP ${response.status}`);const body=await response.json();if(!body.ok)throw new Error(body.error||'metrics unavailable');authForm.classList.remove('visible');allSamples=body.data.samples;renderSummary(allSamples);updateCategories(allSamples);if(activeTab==='probes')renderProbeExplorer();document.getElementById('freshness').textContent=`Updated ${new Date(body.data.generated_at).toLocaleTimeString()} · ${body.data.degraded_count} degraded`;document.getElementById('error').style.display='none';return true}catch(error){const banner=document.getElementById('error');banner.textContent=`Telemetry unavailable: ${error.message}`;banner.style.display='block';document.getElementById('freshness').textContent='Connection degraded';return false}}
function path(points,w,h){const values=points.filter(Boolean).map(point=>point[1]);if(!values.length)return '';const min=Math.min(...values),span=Math.max(...values)-min||1;let segments=[],current=[];points.forEach((point,index)=>{if(point===null){if(current.length)segments.push(current);current=[];return}current.push(`${(index/Math.max(points.length-1,1))*w},${h-((point[1]-min)/span)*h}`)});if(current.length)segments.push(current);return segments.map(segment=>`<polyline points="${segment.join(' ')}"/>`).join('')}
function resolveGpuRoles(){const roles=new Map();allSamples.filter(sample=>sample.metric==='container.gpu.assignment'&&typeof sample.value==='string').forEach(sample=>{const name=String(sample.labels?.container_name||'').toLowerCase();if(name.includes('heavy'))roles.set(sample.value,'heavy-gpu');else if(name.includes('fast')&&!roles.has(sample.value))roles.set(sample.value,'fast-gpu')});const cards=allSamples.filter(sample=>sample.metric==='gpu.memory.total'&&numeric(sample.value)).sort((left,right)=>left.value-right.value);if(cards.length===2){const fastUuid=cards[0].labels?.gpu_uuid,heavyUuid=cards[1].labels?.gpu_uuid;if(fastUuid&&!roles.has(fastUuid))roles.set(fastUuid,'fast-gpu');if(heavyUuid&&!roles.has(heavyUuid))roles.set(heavyUuid,'heavy-gpu')}return roles}
function gpuName(role,roles){const uuid=[...roles.entries()].find(([,value])=>value===role)?.[0];const identity=allSamples.find(sample=>sample.metric==='gpu.identity'&&sample.labels?.gpu_uuid===uuid);return identity?.value||uuid||'Unassigned graphics card'}
function graphGroup(signal,item,roles){if(['cpu','physical-memory','paging-swap','disk','network'].includes(signal))return'windows';if(['gpu-utilization','dedicated-vram'].includes(signal))return roles.get(item.labels?.gpu_uuid)||'other-gpu';if(signal==='shared-gpu-memory')return'shared-gpu';if(['wsl-docker-memory','wsl-docker-cpu'].includes(signal)){if(item.labels?.boundary==='wsl-vm')return'wsl';if(item.labels?.boundary==='docker-engine')return'docker'}return'other'}
function graphTitle(signal){return({'cpu':'CPU utilization','physical-memory':'Physical memory','paging-swap':'Paging & swap','disk':'Disk throughput','network':'Network throughput','gpu-utilization':'GPU utilization','dedicated-vram':'Dedicated VRAM','shared-gpu-memory':'Shared GPU memory','wsl-docker-memory':'Memory used','wsl-docker-cpu':'CPU utilization'})[signal]||signal}
function renderCurveCard(signal,item){const points=(item.points||[]).filter(Boolean);const values=points.map(point=>point[1]);const latest=values.at(-1);const identity=Object.entries(item.labels||{}).filter(([key])=>!['gpu_uuid','gpu_index','boundary','source','attribution'].includes(key)).map(([,value])=>value).join(' · ');const meta=[item.host_id,identity].filter(Boolean).join(' · ');const sample={metric:item.metric,host_id:item.host_id,labels:item.labels||{},value:latest,unit:item.unit};const capacity=capacityFor(sample),severity=capacitySeverity(sample);return `<div class="curve ${severity}"><div class="curve-head"><div style="min-width:0"><div class="curve-title">${esc(graphTitle(signal))}</div><div class="curve-meta">${esc(meta)}</div></div><div class="curve-value ${severity}">${esc(readingFor(sample))}</div></div><svg viewBox="0 0 360 86" preserveAspectRatio="none" role="img" aria-label="${esc(graphTitle(signal))} recent curve"><g>${path(item.points||[],360,86)}</g></svg><div class="curve-range"><span>MIN ${esc(displayValue(values.length?Math.min(...values):null,item.unit))}</span><span>OBSERVED MAX ${esc(displayValue(values.length?Math.max(...values):null,item.unit))}</span>${capacity?`<span>CAP ${esc(displayValue(capacity.value,capacity.unit))}</span>`:''}</div></div>`}
async function refreshCurves(){try{const response=await apiFetch('/v1/timeseries',{cache:'no-store'});const body=await response.json();if(!body.ok)throw new Error(body.error||'history unavailable');const roles=resolveGpuRoles();const cards={windows:[], 'fast-gpu':[], 'heavy-gpu':[], 'shared-gpu':[],wsl:[],docker:[], 'other-gpu':[],other:[]};Object.entries(body.data.signals).forEach(([signal,series])=>series.forEach(item=>cards[graphGroup(signal,item,roles)].push(renderCurveCard(signal,item))));const running=allSamples.filter(sample=>sample.metric==='container.status'&&sample.value==='running').length;const host=allSamples.find(sample=>sample.metric==='host.cpu.utilization')?.host_id||'Windows host';const groups=[['windows','Windows system',host],['fast-gpu','Fast tier GPU',gpuName('fast-gpu',roles)],['heavy-gpu','Heavy tier GPU',gpuName('heavy-gpu',roles)],['shared-gpu','Shared graphics memory','Windows non-local adapter memory'],['wsl','WSL','WSL VM boundary'],['docker','Docker',`${running} running containers · engine/container aggregate`],['other-gpu','Other graphics cards','No tier assignment'],['other','Other signals','Unclassified telemetry']];document.getElementById('curves').innerHTML=groups.filter(([key])=>cards[key].length||['windows','fast-gpu','heavy-gpu','wsl','docker'].includes(key)).map(([key,title,description])=>`<section class="chart-section" aria-label="${esc(title)} graphs"><div class="chart-section-head"><h3>${esc(title)}</h3><p>${esc(description)}</p></div><div class="curves">${cards[key].length?cards[key].join(''):'<div class="empty">No retained signal</div>'}</div></section>`).join('')}catch(_error){document.getElementById('curves').innerHTML='<div class="empty">Recent history unavailable</div>'}}
async function refreshIndicators(){try{const response=await apiFetch('/v1/indicators',{cache:'no-store'});const body=await response.json();if(!body.ok)throw new Error(body.error||'indicators unavailable');const data=body.data;const rows=[...data.pressure.map(item=>({name:`${item.host_id} · ${item.metric}`,value:item.severity,status:item.status})),...data.ownership.map(item=>({name:`${item.owner} · ${item.metric}`,value:item.attribution,status:item.status})),...data.freshness.map(item=>({name:`${item.host_id} · ${item.metric}`,value:'STALE',status:'stale'}))];document.getElementById('indicators').innerHTML=rows.length?rows.slice(0,8).map(item=>`<div class="row ${item.status==='ok'?'':'degraded'}"><div class="name"><span class="state"></span>${esc(item.name)}</div><div class="value">${esc(item.value)}</div></div>`).join(''):'<div class="empty">No pressure or stale signals</div>';const loading=data.model_loading;document.getElementById('loading').innerHTML=`<div class="row"><div class="name"><span class="state"></span>${esc(loading.phase)} · ${esc(loading.attribution)}</div><div class="value">Host ${esc(loading.host_memory??'—')} → Shared ${esc(loading.shared_gpu_memory??'—')} → VRAM ${esc(loading.dedicated_vram??'—')}</div></div>`}catch(_error){document.getElementById('indicators').innerHTML='<div class="empty">Indicators unavailable</div>'}}
async function refreshHistory(){try{const response=await apiFetch('/v1/history',{cache:'no-store'});const body=await response.json();if(!body.ok)throw new Error(body.error||'history unavailable');const select=document.getElementById('session');const selected=select.value;select.innerHTML='<option value="">No retained session</option>'+body.data.sessions.map(session=>`<option value="${esc(session.session_id)}">${esc(session.session_id)} · ${esc(session.capture_quality)} · ${session.gap_count} gaps</option>`).join('');select.value=selected;document.getElementById('comparison').innerHTML=`<div class="row"><div class="name">Recent bounded history</div><div class="value">${body.data.recent.frame_count} frames · ${body.data.recent.retained_bytes} bytes</div></div>`}catch(_error){document.getElementById('comparison').innerHTML='<div class="empty">History unavailable</div>'}}
async function compareSession(){const session=document.getElementById('session').value;if(!session)return;const query=new URLSearchParams({session,metric:'host.cpu.utilization'});const response=await apiFetch('/v1/compare?'+query,{cache:'no-store'});const body=await response.json();document.getElementById('comparison').innerHTML=body.ok?`<div class="row"><div class="name">CPU comparison · ${esc(session)}</div><div class="value">${body.data.aligned.length} aligned · ${body.data.benchmark_gaps.length} explicit gaps</div></div>`:`<div class="empty">${esc(body.error)}</div>`}
async function refreshAll(){if(await refresh())await Promise.all([refreshCurves(),refreshIndicators(),refreshHistory()])}
document.querySelectorAll('[data-tab]').forEach(tab=>tab.addEventListener('click',()=>activateTab(tab.dataset.tab)));
document.getElementById('probe-search').addEventListener('input',renderProbeExplorer);
document.getElementById('probe-category').addEventListener('change',renderProbeExplorer);
authForm.addEventListener('submit',event=>{event.preventDefault();authToken=document.getElementById('token').value.trim();if(!authToken){requireToken();return}sessionStorage.setItem('anvil-dashboard-token',authToken);document.getElementById('token').value='';refreshAll()});
document.getElementById('session').addEventListener('change',compareSession);refreshAll();setInterval(refreshAll,2000);
</script>
