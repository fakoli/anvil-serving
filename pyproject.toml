[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "anvil-serving"
version = "0.1.0"
description = "Right-size and run a local LLM serving tier from your own coding-agent usage."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"   # stdlib tomllib is 3.11+ (config.py already relies on it)
authors = [{ name = "Sekou Doumbouya" }]
keywords = ["llm", "sglang", "vllm", "inference", "claude-code", "local-llm", "blackwell"]
dependencies = []   # stdlib-only by design; optional extras pull in nothing required

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
anvil-serving = "anvil_serving.cli:main"

[tool.setuptools.packages.find]
include = ["anvil_serving*"]   # ship subpackages (e.g. anvil_serving.router) too

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
