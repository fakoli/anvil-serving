name: Docs

on:
  push:
    branches: [main]
  pull_request:

# Minimal read-only default; deploy job gets pages+id-token write via job-level override.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build (strict — fails on any warning)
        run: mkdocs build --strict

      # Only upload the artifact when we are about to deploy (push to main).
      # PRs get the strict build check above but never upload.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # GitHub Actions OIDC token — required by actions/deploy-pages.
    # Flip the repo Pages source to "GitHub Actions" once this workflow lands.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
