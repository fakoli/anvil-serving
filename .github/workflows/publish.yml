name: Publish to PyPI

# Publishes anvil-serving to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
# The matching publisher is registered at pypi.org/manage/account/publishing/:
#   Owner: fakoli | Repo: anvil-serving | Workflow: publish.yml | Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:   # allow a manual run from the Actions tab if needed

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
