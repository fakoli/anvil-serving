name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check .

  build:
    name: build + wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine metadata check
        run: python -m twine check dist/*

      - name: Clean-install smoke (fresh venv, wheel + entry point + package data)
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --upgrade pip
          /tmp/smoke/bin/python -m pip install dist/*.whl
          # Proves the wheel ships the package, the console entry point, and the
          # tier0_keywords.json package-data (router run --help imports the router
          # chain, which loads that JSON at import time). Non-zero exit fails CI.
          /tmp/smoke/bin/anvil-serving router run --help
