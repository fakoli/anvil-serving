name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONNOUSERSITE: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-ux-audit:
    name: CLI UX audit ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate current audit
        run: python scripts/audit_cli_ux.py --check
      - name: Reject audit regressions from trusted history
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git cat-file -e "$BASE_SHA:docs/CLI-UX-AUDIT.json"; then
            git show "$BASE_SHA:docs/CLI-UX-AUDIT.json" > "$RUNNER_TEMP/CLI-UX-AUDIT.json"
            python scripts/audit_cli_ux.py --check --baseline-audit "$RUNNER_TEMP/CLI-UX-AUDIT.json"
          else
            echo "No base audit exists; validating initial bootstrap only."
          fi

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Verify active CLI references
        run: python scripts/audit_cli_references.py --check --scope full

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check .

  build:
    name: build + clean wheel smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine metadata check
        run: python -m twine check dist/*

      - name: Verify active CLI references
        run: python scripts/audit_cli_references.py --check --scope full

      - name: Clean-install smoke (fresh venv, no deps, canonical entry point, package data)
        run: python scripts/wheel_smoke.py
