site_name: anvil-serving
site_description: >-
  The quality-gated local-model router for coding agents.
  Run local where it is measured safe. Verify risky local output. Keep cloud explicit.
site_url: https://fakoli.github.io/anvil-serving/
repo_url: https://github.com/fakoli/anvil-serving
repo_name: fakoli/anvil-serving
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: readthedocs
  # Disable the RTD theme's built-in highlight.js to avoid double-processing
  # with pymdownx.highlight (which handles syntax highlighting at build time).
  highlightjs: false

plugins:
  - search
  - mermaid2:
      # Use a stable mermaid 11.x release; the plugin injects this CDN JS
      # automatically - no extra_javascript block needed.
      version: '11.4.1'

nav:
  - Home: index.md
  - Get started: GETTING-STARTED.md
  - Architecture: ARCHITECTURE.md
  - Reference:
      - CLI:
          - Overview: CLI.md
          - Router: cli/router.md
          - Model serves: cli/serves.md
          - Models & recipes: cli/models.md
          - Evaluation & benchmarks: cli/eval.md
          - Host & setup: cli/host.md
          - Control plane & integrations: cli/control-plane.md
          - Voice: cli/voice.md
      - Configuration: CONFIGURATION.md
      - Terminology: TERMINOLOGY.md
  - Product design:
      - Quality-gated router (deep dive): QUALITY-GATED-ROUTER.md
  - Operations:
      - Operator playbooks: OPERATOR-PLAYBOOKS.md
      - Troubleshooting: TROUBLESHOOTING.md
      - Serves & eval: SERVES-AND-EVAL.md
      - ComfyUI migration runbook: COMFYUI-MIGRATION-RUNBOOK.md
      - Model settings: MODEL-SETTINGS-EXAMPLE.md
      - Device topologies: DEVICE-TOPOLOGIES.md
      - Operator skills and sub-agents: OPERATOR-SKILLS-AND-SUBAGENTS.md
  - Benchmarks & findings:
      - RTX PRO 6000 benchmark guide: benchmarks/index.md
      - Model recipes & gotchas: benchmarks/models.md
      - Methodology & evidence: benchmarks/methodology.md
      - Result archive: BENCHMARKS.md
      - External benchmarks: EXTERNAL-BENCHMARKS.md
      - Findings index: findings/README.md
  - Integrations:
      - OpenClaw integration spec: OPENCLAW-INTEGRATION-SPEC.md
      - Voice pipeline: VOICE.md
  - Decisions & research:
      - ADR overview: adr/README.md
      - 'ADR-0001: Cloud cost & subscription auth': adr/0001-cloud-cost-and-subscription-auth.md
      - 'ADR-0002: Serves are Compose-defined': adr/0002-serves-are-compose-defined.md
      - 'ADR-0003: Portable defaults & generic onboarding': adr/0003-portable-defaults-and-generic-onboarding.md
      - 'ADR-0004: Router as a service': adr/0004-router-as-a-service-containerized-and-authed.md
      - 'ADR-0005: anvil-503 native failover unreliable': adr/0005-anvil-503-native-failover-unreliable.md
      - 'ADR-0006: Multiplexer swap draining': adr/0006-multiplexer-swap-draining.md
      - 'ADR-0007: Subscription-auth cloud tier': adr/0007-subscription-auth-cloud-tier.md
      - 'ADR-0008: Heavy-tier speculative decoding': adr/0008-heavy-tier-speculative-decoding.md
      - 'ADR-0009: Profile write-back loop': adr/0009-profile-write-back-loop.md
      - 'ADR-0010: Specialized-engine tier': adr/0010-specialized-engine-tier.md
      - 'ADR-0011: Two-mode operation': adr/0011-two-mode-operation.md
      - 'ADR-0012: Serve and router management verbs': adr/0012-serve-and-router-management-verbs.md
      - 'ADR-0013: OpenClaw layers and MCP control plane': adr/0013-openclaw-layers-and-mcp-control-plane.md
      - 'ADR-0014: Tailnet controller transport': adr/0014-tailnet-controller-transport.md
      - 'ADR-0015: Operator skills and sub-agent workflows': adr/0015-operator-skills-and-subagent-workflows.md
      - ADR template: adr/template.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # fence_mermaid (NOT fence_mermaid_custom) emits <div class="mermaid">
          # without a <code> wrapper and without escaping < / > - so <br/> in node
          # labels stays as literal text that mermaid.js can parse.
          # fence_mermaid_custom sets custom=True -> <pre class="mermaid"><code>
          # which wraps the source in <code>, breaking the mermaid parser.
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.snippets:
      base_path: ['.']
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
