interface:
  display_name: "Anvil Serving Workbench"
  short_description: "MCP playbooks and benchmark evidence."
  default_prompt: "Use $anvil-serving-workbench to inspect status, choose a safe playbook, run bounded evidence checks when needed, and produce an operator packet. For OpenClaw voice work, name the command host before interpreting loopback: Mini-local audio/proxy ports only mean Fakoli Mini loopback, not the operator machine."

dependencies:
  tools:
    - type: "mcp"
      value: "anvil-serving"
      description: "anvil-serving MCP or controller tools for router/serve status, bounded logs, model inventory, route decisions, OpenClaw sync, preflight, benchmarks, and promotion previews; use documented CLI verbs only as preview-returning fallback when a wrapper is missing"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
