interface:
  display_name: "Anvil Serving Workbench"
  short_description: "Operate anvil-serving through MCP-backed playbooks."
  default_prompt: "Use $anvil-serving-workbench to inspect status, choose a safe playbook, and produce an evidence packet."

dependencies:
  tools:
    - type: "mcp"
      value: "anvil-serving"
      description: "anvil-serving MCP or controller tools for status, route probes, preflight, benchmarks, and OpenClaw sync"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
