interface:
  display_name: "Anvil Serving Workbench"
  short_description: "MCP playbooks and benchmark evidence."
  default_prompt: "Use $anvil-serving-workbench to inspect the current MCP catalog and operation contracts, choose a safe playbook, distinguish capacity probes from repeated model-aware quality evidence, and produce an operator packet. For OpenClaw voice work, name the command host before interpreting loopback: Fakoli Mini runs gateway/realtime/proxy only in the reference topology; STT/TTS/LLM model serves live off Mini unless the operator explicitly selects optional mini-audio."

dependencies:
  tools:
    - type: "mcp"
      value: "anvil-serving"
      description: "anvil-serving MCP or controller tools for router/serve status, bounded logs, model inventory, route decisions, OpenClaw sync, preflight, benchmarks, and promotion previews; use documented CLI verbs only as preview-returning fallback when a wrapper is missing"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
