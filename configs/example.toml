# anvil-serving config (optional). Most things auto-detect; override here as needed.
claude_logs   = "~/.claude/projects"          # where `profile` reads usage
hf_extra_roots = []                            # extra HF cache hub dirs to scan for `models sync`
model_dirs     = []                            # plain (non-HF-cache) model folders
gpu_index      = 0                             # GPU to pin the serve to
served_model_name = "local-specialist"

# ── Router tier topology (harness-router; see docs/QUALITY-GATED-ROUTER.md §4/§6) ──
# auth_env names an ENV VAR; the secret itself is NEVER stored here.
[router]
mapping_version = "2026-06-29.0"

[[router.tiers]]
id            = "fast-local"
base_url      = "http://127.0.0.1:30001/v1"   # vLLM gpt-oss-20b (OpenAI-compatible)
dialect       = "openai"
context_limit = 32768
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_FAST_LOCAL_KEY"

[[router.tiers]]
id            = "heavy-local"
base_url      = "http://127.0.0.1:30000/v1"   # SGLang qwen3-coder-30b (OpenAI-compatible)
dialect       = "openai"
context_limit = 131072
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_HEAVY_LOCAL_KEY"

[[router.tiers]]
id            = "cloud"
base_url      = "https://api.anthropic.com"
dialect       = "anthropic"
context_limit = 200000
privacy       = "cloud"
tool_support  = true
auth_env      = "ANTHROPIC_API_KEY"

# preset -> ordered candidate tier pool (filter then rank; planning->cloud is eval-proven)
[router.presets]
chat         = ["fast-local", "cloud"]
quick-edit   = ["fast-local", "heavy-local", "cloud"]
review       = ["heavy-local", "cloud"]
planning     = ["cloud"]
long-context = ["heavy-local", "cloud"]
