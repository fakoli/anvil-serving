# anvil-serving config (optional). Most things auto-detect; override here as needed.
claude_logs   = "~/.claude/projects"          # where `profile` reads usage
hf_extra_roots = []                            # extra HF cache hub dirs to scan for `models sync`
model_dirs     = []                            # plain (non-HF-cache) model folders
gpu_index      = 0                             # GPU to pin the serve to
served_model_name = "local-specialist"

# ── Router tier topology (harness-router; see docs/QUALITY-GATED-ROUTER.md §4/§6) ──
# auth_env names an ENV VAR; the secret itself is NEVER stored here.
#
# DEFAULT: local-only. No cloud API key is required or stored in this file.
# The shipped default holds ZERO cloud credentials (ADR-0001 / advise-and-defer).
# See configs/example-with-cloud.toml for the opt-in metered cloud tier.
[router]
mapping_version = "2026-06-30.0"
# relay_timeout = 20   # seconds; transport timeout for LOCAL tiers (default 20s; genericity:T005)
# verify_local_min = true  # minimal empty/truncated-response check on a local "allow" tier (default true; genericity:T004)

[[router.tiers]]
id            = "fast-local"
base_url      = "http://127.0.0.1:30001/v1"   # vLLM gpt-oss-20b (OpenAI-compatible)
model         = "gpt-oss-20b"                  # REQUIRED: the serve's --served-model-name (else the preset token is forwarded and 404s)
dialect       = "openai"
context_limit = 32768
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_FAST_LOCAL_KEY"
# extra_body merges verbatim into the upstream request body (genericity:T003).
# Uncomment for a thinking-by-default local model (Qwen3.5, gpt-oss, ...) that
# otherwise burns its max_tokens budget reasoning and returns empty content
# (CLAUDE.md gotcha #6/#9):
# extra_body = { chat_template_kwargs = { enable_thinking = false } }

[[router.tiers]]
id            = "heavy-local"
base_url      = "http://127.0.0.1:30000/v1"   # SGLang heavy local tier (OpenAI-compatible)
model         = "qwen35-awq-local"             # REQUIRED: the serve's --served-model-name (else the preset token is forwarded and 404s)
                                                # (fakoli-dark heavy tier; keep in sync with examples/fakoli-dark/{docker-compose.yml,docker-compose.heavy.yml,serves.toml})
dialect       = "openai"
context_limit = 131072
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_HEAVY_LOCAL_KEY"
# extra_body = { chat_template_kwargs = { enable_thinking = false } }

# preset -> ordered candidate tier pool (filter then rank)
# Local-only: all presets route to free local GPU tiers.
# To opt in to a metered cloud tier, see configs/example-with-cloud.toml.
[router.presets]
chat         = ["fast-local", "heavy-local"]
quick-edit   = ["fast-local", "heavy-local"]
review       = ["heavy-local"]
planning     = ["heavy-local"]
long-context = ["heavy-local"]
