# anvil-serving config for the containerized fakoli-dark router (ADR-0004).
#
# Use this with examples/fakoli-dark/docker-compose.yml's `router` service. The
# router itself runs in a container and reaches the loopback-published vLLM
# serves through host.docker.internal:<port>; the raw vLLM endpoints stay bound
# to 127.0.0.1 on the Docker host.
#
# [server].auth_env names an ENV VAR holding the router bearer/x-api-key token.
# The token value is never stored in this file.
[server]
auth_env = "ANVIL_ROUTER_TOKEN"

[router]
mapping_version = "2026-07-06.fakoli-dark"
verify_local_min = true
# The deployed router image reads this path inside the anvil-router-cfg volume.
profile_path = "/etc/anvil/profile.json"

[[router.tiers]]
id            = "fast-local"
base_url      = "http://host.docker.internal:30003/v1"
model         = "qwen36-27b"
dialect       = "openai"
context_limit = 32768
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_FAST_LOCAL_KEY"
# Qwen thinking off for the latency tier: avoids empty-content starvation on
# short/voice turns and keeps TTFT low.
extra_body    = { chat_template_kwargs = { enable_thinking = false } }

[[router.tiers]]
id            = "heavy-local"
base_url      = "http://host.docker.internal:30002/v1"
model         = "gpt-oss-120b"
dialect       = "openai"
context_limit = 131072
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_HEAVY_LOCAL_KEY"
# gpt-oss honors reasoning_effort, not enable_thinking. Keep this a soft
# default so a caller can dial it down.
extra_body_defaults = { reasoning_effort = "high" }

# preset -> ordered candidate tier pool.
[router.presets]
chat         = ["heavy-local", "fast-local"]
chat-fast    = ["fast-local", "heavy-local"]
quick-edit   = ["heavy-local", "fast-local"]
review       = ["heavy-local"]
planning     = ["heavy-local"]
long-context = ["heavy-local"]
