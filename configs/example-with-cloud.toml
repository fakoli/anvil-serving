# ─────────────────────────────────────────────────────────────────────────────
# OPT-IN CLOUD TIER — METERED API BILLING  (ADR-0001 / advise-and-defer)
#
# This file demonstrates the optional cloud tier.  Including a cloud tier
# incurs METERED API billing on every cloud-routed request ($/token, not flat).
#
# THE CLOUD TIER IS OFF BY DEFAULT.  The default shipped config is
# configs/example.toml, which is local-only and holds zero cloud credentials.
#
# Only configure a cloud tier here if your harness cannot route cloud traffic
# itself.  OpenClaw-style harnesses should route cloud directly using their
# own subscription (see docs/adr/0001-cloud-cost-and-subscription-auth.md):
# routing cloud through anvil uses a metered API key, while routing through
# the harness uses the flat-rate subscription you already pay for.
#
# To activate the cloud tier you must set the auth_env variable before starting
# the router (auth_env names the ENV VAR; the secret is NEVER stored here):
#   export ANTHROPIC_API_KEY=<your key>
# Without the key, the cloud tier is skipped at startup (not fatal); the local
# tiers still bind and serve.
# ─────────────────────────────────────────────────────────────────────────────
claude_logs   = "~/.claude/projects"          # where `profile` reads usage
hf_extra_roots = []                            # extra HF cache hub dirs to scan for `models sync`
model_dirs     = []                            # plain (non-HF-cache) model folders
gpu_index      = 0                             # GPU to pin the serve to
served_model_name = "local-specialist"

# ── Router tier topology ──────────────────────────────────────────────────────
# auth_env names an ENV VAR; the secret itself is NEVER stored here.
[router]
mapping_version = "2026-06-30.0"
# metered_cloud: the ONLY work-classes that may be served by a metered
# (privacy=="cloud") tier.  Default empty = cloud is NEVER a routing candidate.
# Add a work-class here only when you explicitly accept the per-token $ cost.
# (ADR-0001 / advise-and-defer:T002)
metered_cloud = ["planning"]

[[router.tiers]]
id            = "fast-local"
base_url      = "http://127.0.0.1:30001/v1"   # vLLM gpt-oss-20b (OpenAI-compatible)
model         = "gpt-oss-20b"                  # REQUIRED: the serve's --served-model-name (else the preset token is forwarded and 404s)
dialect       = "openai"
context_limit = 32768
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_FAST_LOCAL_KEY"

[[router.tiers]]
id            = "heavy-local"
base_url      = "http://127.0.0.1:30000/v1"   # SGLang heavy local tier (OpenAI-compatible)
model         = "qwen35-awq-local"             # REQUIRED: the serve's --served-model-name (else the preset token is forwarded and 404s)
dialect       = "openai"
context_limit = 131072
privacy       = "local"
tool_support  = true
auth_env      = "ANVIL_HEAVY_LOCAL_KEY"

# ── OPT-IN: metered cloud tier — incurs $$/token billing ─────────────────────
# Remove or comment out this block to return to local-only (no cloud key needed).
[[router.tiers]]
id            = "cloud"
base_url      = "https://api.anthropic.com"
model         = "claude-sonnet-4-6"            # REQUIRED: upstream provider model id (else the preset token is forwarded and 400/404s)
dialect       = "anthropic"
context_limit = 200000
privacy       = "cloud"
tool_support  = true
auth_env      = "ANTHROPIC_API_KEY"            # export ANTHROPIC_API_KEY=<your key>
# Cost dimension (ADR-0001 / advise-and-defer:T003).  USD per million tokens.
# These reflect Claude Sonnet 4 public pricing at the time of writing; update if
# your tier / contract differs.  Absent on local tiers → 0.0 per request.
cost_input_per_mtok  = 3.0     # $3.00 / million input tokens
cost_output_per_mtok = 15.0    # $15.00 / million output tokens

# preset -> ordered candidate tier pool (filter then rank; planning->cloud is eval-proven)
# Cloud appears in pools where its quality advantage justifies the metered cost.
[router.presets]
chat         = ["fast-local", "cloud"]
chat-fast    = ["fast-local", "cloud"]   # low-latency (voice pipeline): fast-tier-first
quick-edit   = ["fast-local", "heavy-local", "cloud"]
review       = ["heavy-local", "cloud"]
planning     = ["cloud"]
long-context = ["heavy-local", "cloud"]
# Document OCR and general image understanding need a VISION-capable tier: the
# example's text-only local tiers cannot read image content, so both map to the
# (vision-capable) cloud model.
# NOTE: cloud eligibility is still gated by [router].metered_cloud above — add
# "ocr"/"vision" there to accept the metered cost, or (better) point these
# presets at local image-capable serves at $0 (e.g. PaddleOCR-VL / Qwen3-VL on
# vLLM; see examples/fakoli-dark/anvil-router.live.toml's ocr-local and
# vision-local tiers).
ocr          = ["cloud"]
vision       = ["cloud"]
